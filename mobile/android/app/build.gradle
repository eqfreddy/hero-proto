apply plugin: 'com.android.application'

android {
    namespace = "com.heroproto.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId = "com.heroproto.app"
        minSdk = rootProject.ext.minSdkVersion
        targetSdk = rootProject.ext.targetSdkVersion
        // Version is injected by mobile/build-prod-android.sh from git rev-count
        // so every release upload to Play increments. ANDROID_VERSION_NAME falls
        // back to "1.0-dev" so local debug builds still work.
        versionCode = (System.getenv("ANDROID_VERSION_CODE") ?: "1") as Integer
        versionName = System.getenv("ANDROID_VERSION_NAME") ?: "1.0-dev"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            def keystoreFile = System.getenv("ANDROID_KEYSTORE_PATH")
            def keystorePass = System.getenv("ANDROID_KEYSTORE_PASSWORD")
            def keyAlias    = System.getenv("ANDROID_KEY_ALIAS") ?: "heroproto"
            def keyPass     = System.getenv("ANDROID_KEY_PASSWORD")
            if (keystoreFile && keystorePass && keyPass) {
                storeFile     = file(keystoreFile)
                storePassword = keystorePass
                keyAlias      = keyAlias
                keyPassword   = keyPass
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def hasSigningConfig = System.getenv("ANDROID_KEYSTORE_PATH") != null
            // Fail loud if RELEASE_REQUIRE_SIGNING is set but keystore env is missing.
            // CI / publish builds set RELEASE_REQUIRE_SIGNING=1 so we never silently
            // ship a debug-signed release that Play would reject after upload.
            if (System.getenv("RELEASE_REQUIRE_SIGNING") == "1" && !hasSigningConfig) {
                throw new GradleException(
                    "RELEASE_REQUIRE_SIGNING=1 but ANDROID_KEYSTORE_PATH unset — refusing to build a debug-signed release."
                )
            }
            signingConfig = hasSigningConfig ? signingConfigs.release : signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
