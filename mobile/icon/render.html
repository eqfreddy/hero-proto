<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh}
  img{display:block;image-rendering:auto}
</style></head>
<body><img id="ic" src="hero-proto.svg"></body>
<script>
  const p = new URLSearchParams(location.search);
  const s = parseInt(p.get('size') || '512', 10);
  document.body.style.width = s + 'px';
  document.body.style.height = s + 'px';
  document.body.style.minHeight = s + 'px';
  const img = document.getElementById('ic');
  img.style.width = s + 'px';
  img.style.height = s + 'px';
</script>
</html>
