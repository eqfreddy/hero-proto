<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" aria-label="hero-proto adaptive foreground">
  <defs>
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00ffe0" />
      <stop offset="55%"  stop-color="#00ffe0" />
      <stop offset="100%" stop-color="#9b30ff" />
    </linearGradient>
    <linearGradient id="glyphStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7afff0" />
      <stop offset="100%" stop-color="#00ffe0" />
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Adaptive icon: scale source 1024 → ~683 (66.67%) and centre.
       transform: translate by (1024-683)/2 = 170, scale 0.667.
       Outer 18dp of the 108dp canvas may be clipped by launcher masks. -->
  <g transform="translate(170,170) scale(0.667)">

    <circle cx="512" cy="540" r="240" fill="#9b30ff" opacity="0.22" filter="url(#softGlow)"/>
    <circle cx="512" cy="500" r="170" fill="#00ffe0" opacity="0.18" filter="url(#softGlow)"/>

    <g filter="url(#neonGlow)">
      <polygon points="512,128 832,308 832,716 512,896 192,716 192,308"
               fill="none" stroke="url(#hexStroke)" stroke-width="6" stroke-linejoin="miter"/>
    </g>
    <polygon points="512,176 790,332 790,692 512,848 234,692 234,332"
             fill="rgba(0,255,224,0.03)" stroke="rgba(0,255,224,0.45)" stroke-width="1.5" stroke-linejoin="miter"/>

    <g fill="#04060c" stroke="#00ffe0" stroke-width="3">
      <circle cx="512" cy="128" r="11"/>
      <circle cx="832" cy="308" r="11"/>
      <circle cx="832" cy="716" r="11"/>
      <circle cx="512" cy="896" r="11"/>
      <circle cx="192" cy="716" r="11"/>
      <circle cx="192" cy="308" r="11"/>
    </g>

    <g stroke="rgba(0,255,224,0.35)" stroke-width="2">
      <line x1="512" y1="200" x2="512" y2="220"/>
      <line x1="512" y1="804" x2="512" y2="824"/>
      <line x1="260" y1="512" x2="282" y2="512"/>
      <line x1="742" y1="512" x2="764" y2="512"/>
    </g>

    <g filter="url(#neonGlow)">
      <polygon points="512,300 562,360 512,420 462,360" fill="#04060c"
               stroke="url(#glyphStroke)" stroke-width="7" stroke-linejoin="miter"/>
      <circle cx="512" cy="360" r="9" fill="#00ffe0"/>
      <line x1="512" y1="420" x2="512" y2="448" stroke="#00ffe0" stroke-width="7"/>
      <line x1="392" y1="478" x2="632" y2="478" stroke="#00ffe0" stroke-width="7"/>
      <rect x="380" y="466" width="24" height="24" fill="#04060c" stroke="#00ffe0" stroke-width="5"/>
      <rect x="620" y="466" width="24" height="24" fill="#04060c" stroke="#00ffe0" stroke-width="5"/>
      <path d="M 512 478 L 512 590 L 432 660 L 432 692" fill="none" stroke="#00ffe0" stroke-width="7" stroke-linejoin="miter"/>
      <path d="M 512 590 L 592 660 L 592 692" fill="none" stroke="#00ffe0" stroke-width="7" stroke-linejoin="miter"/>
      <rect x="500" y="510" width="24" height="24" fill="#04060c" stroke="#ffd700" stroke-width="4"/>
      <rect x="506" y="516" width="12" height="12" fill="#ffd700"/>
      <rect x="418" y="692" width="28" height="10" fill="#00ffe0"/>
      <rect x="578" y="692" width="28" height="10" fill="#00ffe0"/>
    </g>

    <g opacity="0.55" filter="url(#softGlow)">
      <polygon points="512,304 558,360 512,416 466,360" fill="none" stroke="#9b30ff" stroke-width="3"/>
      <line x1="512" y1="478" x2="512" y2="590" stroke="#9b30ff" stroke-width="3"/>
    </g>

  </g>
</svg>
