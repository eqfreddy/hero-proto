{% extends "base.html" %}
{% block title %}hero-proto · dashboard{% endblock %}
{% block head %}
<style>
  header { background: var(--panel); padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; }
  header h1 { font-size: 16px; margin: 0; color: var(--text); }
  nav { display: flex; gap: 2px; }
  nav button { background: transparent; color: var(--muted); padding: 6px 12px; border-bottom: 2px solid transparent; border-radius: 0; }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  nav button:hover { color: var(--text); }
  #who { margin-left: auto; color: var(--muted); font-size: 12px; display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-inset, var(--bg)); border-radius: 4px; border: 1px solid var(--border); }
  #who.signed-in { color: var(--good); border-color: color-mix(in srgb, var(--good) 40%, transparent); }
  main { padding: 18px; max-width: 1100px; margin: 0 auto; }
  main > .loading { color: var(--muted); display: flex; align-items: center; gap: 8px; }
</style>
{% endblock %}
{% block body %}
<header>
  <h1>hero-proto</h1>
  <nav id="tabs">
    <button data-tab="login" hx-get="/app/partials/login" hx-target="#content">Login</button>
    <button data-tab="me" hx-get="/app/partials/me" hx-target="#content">Me</button>
    <button data-tab="roster" hx-get="/app/partials/roster" hx-target="#content">Roster</button>
    <button data-tab="summon" hx-get="/app/partials/summon" hx-target="#content">Summon</button>
    <button data-tab="stages" hx-get="/app/partials/stages" hx-target="#content">Stages</button>
    <button data-tab="daily" hx-get="/app/partials/daily" hx-target="#content">Daily</button>
    <button data-tab="event" id="tab-event" hx-get="/app/partials/event" hx-target="#content" style="display: none;">⚡ Event</button>
    <button data-tab="arena" hx-get="/app/partials/arena" hx-target="#content">Arena</button>
    <button data-tab="guild" hx-get="/app/partials/guild" hx-target="#content">Guild</button>
    <button data-tab="shop" hx-get="/app/partials/shop" hx-target="#content">Shop</button>
  </nav>
  <span id="who"></span>
</header>
<main>
  <div id="content"><div class="loading"><span class="spinner"></span> loading…</div></div>
</main>
{% endblock %}
{% block scripts %}
<script>
  // Tab state: highlight active tab and persist choice.
  document.querySelectorAll('nav button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      localStorage.setItem('heroproto_tab', b.dataset.tab);
    });
  });
  // Signed-in indicator. Pull the display name from /me once on load so the
  // header matches the Me tab's "signed in as X" pill instead of just
  // showing a generic "signed in".
  async function refreshWho() {
    const el = document.getElementById('who');
    const token = localStorage.getItem('heroproto_jwt');
    if (!token) {
      el.textContent = 'not signed in';
      el.classList.remove('signed-in');
      return;
    }
    el.classList.add('signed-in');
    try {
      const r = await fetch('/me', { headers: { authorization: 'Bearer ' + token } });
      if (r.ok) {
        const me = await r.json();
        const name = (me.email || '').split('@')[0] || 'signed in';
        el.textContent = `✓ ${name}`;
        return;
      }
    } catch {}
    el.textContent = '✓ signed in';
  }
  document.body.addEventListener('htmx:afterRequest', refreshWho);
  refreshWho();

  // Auto-show the Event tab during a live event window. Probes /events/active
  // once on load and shows the button if anything's live. Re-probes after every
  // navigation so the tab disappears the moment an event ends.
  async function probeEvent() {
    const token = localStorage.getItem('heroproto_jwt');
    if (!token) return;
    const tab = document.getElementById('tab-event');
    if (!tab) return;
    try {
      const r = await fetch('/events/active', { headers: { authorization: 'Bearer ' + token } });
      tab.style.display = r.ok ? '' : 'none';
      if (r.ok) {
        // Sparkle the tab if there's something to claim or redeem.
        const body = await r.json();
        const has_claimable = (body.quests || []).some(q => q.completed && !q.claimed);
        const has_affordable = (body.milestones || []).some(m => m.affordable && !m.redeemed);
        if (has_claimable || has_affordable) {
          tab.style.color = 'var(--r-legendary)';
          tab.style.fontWeight = '700';
        }
      }
    } catch {}
  }
  document.body.addEventListener('htmx:afterRequest', probeEvent);
  probeEvent();
  // Auto-load last-used tab (or login if none).
  const startTab = localStorage.getItem('heroproto_tab') || (localStorage.getItem('heroproto_jwt') ? 'me' : 'login');
  const startBtn = document.querySelector(`[data-tab="${startTab}"]`) || document.querySelector('[data-tab="login"]');
  startBtn.click();
</script>
{% endblock %}
