<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hero-proto · battle replay</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0b0d10; color: #ddd; margin: 0; }
    header { background: #14181e; padding: 8px 16px; border-bottom: 1px solid #2d3847; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 16px; margin: 0; }
    header .links a { color: #4ea1ff; text-decoration: none; font-size: 13px; margin-left: 12px; }
    #game { display: flex; justify-content: center; background: #0b0d10; }
    #controls { background: #14181e; padding: 10px 16px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #2d3847; }
    #controls button { background: #2a7a4a; color: white; border: 0; padding: 6px 12px; border-radius: 3px; cursor: pointer; font: inherit; }
    #controls button.secondary { background: #1b2430; color: #ddd; border: 1px solid #2d3847; }
    #controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    #progress { flex: 1; color: #7d8a9c; font-size: 12px; margin-left: 8px; }
    #speed { background: #1b2430; color: #eee; border: 1px solid #2d3847; padding: 4px; border-radius: 3px; }
    #result { padding: 12px 16px; font-size: 14px; }
    #result .win { color: #6dd39a; }
    #result .loss { color: #ff6b4a; }
    #result .draw { color: #ffd86b; }
    #loading { padding: 20px; color: #7d8a9c; }
  </style>
</head>
<body>
  <header>
    <h1>battle replay · <span id="bid">—</span></h1>
    <div class="links">
      <a href="/app/">← dashboard</a>
      <a href="#" id="toggle-dom">view DOM version</a>
    </div>
  </header>
  <div id="loading">loading…</div>
  <div id="game"></div>
  <div id="controls" style="display:none;">
    <button id="btn-play">▶ Play</button>
    <button class="secondary" id="btn-step">Step</button>
    <button class="secondary" id="btn-restart">↻ Restart</button>
    <label style="font-size: 13px;">speed
      <select id="speed">
        <option value="900">0.33×</option>
        <option value="600">0.5×</option>
        <option value="300" selected>1×</option>
        <option value="150">2×</option>
        <option value="60">5×</option>
      </select>
    </label>
    <span id="progress">—</span>
  </div>
  <div id="result"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    // --------------- data fetch ------------------------------------------------
    const TOKEN_KEY = "heroproto_jwt";
    const params = new URLSearchParams(location.search);
    const battleId = params.get("id");
    document.getElementById("bid").textContent = battleId || "?";
    document.getElementById("toggle-dom").href = battleId ? `/app/battle-replay.html?id=${battleId}` : "/app/";

    // Mode selector: ?mode=arena fetches /arena/matches/{id}; default is /battles/{id}.
    const mode = params.get("mode") || "battle";
    async function loadBattle(id) {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) throw new Error("not signed in — log in on the dashboard first");
      const path = mode === "arena" ? `/arena/matches/${id}` : `/battles/${id}`;
      const r = await fetch(path, { headers: { authorization: "Bearer " + token } });
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 200));
      return r.json();
    }

    // --------------- Phaser scene ---------------------------------------------
    const CANVAS_W = 960, CANVAS_H = 520;

    class BattleScene extends Phaser.Scene {
      // Glyph-per-status for the status row. Emoji carry their own color so
      // the row stays readable without inline color spans (Phaser Text doesn't
      // support those). Add new entries here when StatusEffectKind grows.
      static STATUS_GLYPH = {
        POISON:     "☣",
        BURN:       "🔥",
        FREEZE:     "❄",
        STUN:       "💫",
        SHIELD:     "🛡",
        HEAL_BLOCK: "🚫",
        REFLECT:    "🪞",
        ATK_UP:     "⬆",
        DEF_DOWN:   "⬇",
      };

      // Stage-code → cluster-of-fuckery background filename (under
      // /app/static/backgrounds/cof/). Used as a thematic fallback when
      // no per-stage SVG exists in /app/static/backgrounds/<code>.svg.
      // Default fallback is cubicle (the IT department default).
      static STAGE_TO_COF_BG = {
        tutorial_first_ticket: "bg-cubicle.svg",
        onboarding_day:        "bg-cubicle.svg",
        first_outage:          "bg-cable-hell.svg",
        pager_storm:           "bg-cable-hell.svg",
        prod_is_down:          "bg-cable-hell.svg",
        legacy_server_room:    "bg-server-closet.svg",
        tape_room_breach:      "bg-server-closet.svg",
        migration_weekend:     "bg-server-closet.svg",
        the_post_mortem:       "bg-noc.svg",
        the_unauthorized_tool: "bg-storage.svg",
        reorg_announcement:    "bg-openoffice.svg",
        the_all_hands:         "bg-openoffice.svg",
        quarterly_audit:       "bg-bossoffice.svg",
        ceos_one_on_one:       "bg-bossoffice.svg",
        hostile_acquisition:   "bg-bossoffice.svg",
        boardroom_coup:        "bg-bossoffice.svg",
        the_singularity:       "bg-bossoffice.svg",
      };
      static DEFAULT_COF_BG = "bg-cubicle.svg";

      constructor() { super("battle"); }

      init(data) {
        this.battle = data.battle;
        this.cursor = 0;
        this.playing = false;
        this.speedMs = 300;
        this.state = {};      // uid -> {hp, maxHp, sprite, hpBar, hpText, statusRow, dead}
        this.timer = null;
        // True while a multi-step animation chain (lunge → hit-frame → return)
        // is in flight. The play() loop checks this before advancing — keeps
        // the next event from cutting an attack animation short. Borrowed
        // from CodeMonkey's CharacterBattle.cs callback-chain pattern, adapted
        // for our event-log replay model.
        this.attackInFlight = false;
        // Set when SPECIAL has detected an upcoming multi-hit run (e.g.
        // TBFAM's 4-hit "Everything on the Desk", any AOE_DAMAGE). The DAMAGE
        // handler reads this to skip per-hit lunges and just play the hit
        // visual on each target while the attacker stays forward; cleared
        // when hitsRemaining drops to 0 and the slide-back completes.
        this.multiHitMode = null;
      }

      preload() {
        // Portrait per template_code. Phaser auto-fires file-complete; on error, we
        // retry the placeholder endpoint so every uid ends up with a texture.
        const needed = new Map();
        for (const p of this.battle.participants) {
          if (!needed.has(p.template_code)) needed.set(p.template_code, p);
        }
        for (const [code, _] of needed) {
          if (!code) continue;
          const key = "hero_" + code;
          this.load.image(key, `/app/static/heroes/${code}.svg`);
          this.load.image(key + "_ph", `/app/placeholder/hero/${code}.svg`);
        }
        // Stage background. Try the per-stage file first; fall back to a
        // cluster-of-fuckery thematic background (or cubicle as the universal
        // default). Both candidates load in parallel; create() picks the best.
        const code = this.battle.stage_code || "";
        if (code) {
          this.load.image("stage_bg_specific", `/app/static/backgrounds/${code}.svg`);
        }
        const cofFile = BattleScene.STAGE_TO_COF_BG[code] || BattleScene.DEFAULT_COF_BG;
        this.load.image("stage_bg_cof", `/app/static/backgrounds/cof/${cofFile}`);
        // Handle missing real art: fallback is loaded side-by-side, resolveTexture() picks it.
        this.load.on("loaderror", (file) => {
          // silently ignore — placeholder will be used via resolveTexture.
        });
      }

      resolveTexture(code) {
        const key = "hero_" + code;
        if (this.textures.exists(key)) {
          // Phaser puts a fallback texture under the same key if load failed; verify dimensions.
          const t = this.textures.get(key);
          if (t && t.source[0] && t.source[0].width > 1) return key;
        }
        return key + "_ph";
      }

      create() {
        this.cameras.main.setBackgroundColor("#0e1621");
        // Stage background. Prefer the per-stage SVG when it loaded
        // successfully (Phaser leaves a 1×1 fallback texture on 404, so we
        // probe via texture width). Otherwise fall back to the cluster-of-
        // fuckery thematic bg. Both are scaled to fit the canvas and dimmed
        // by an overlay so unit cards stay readable.
        const stretch = (key) => {
          const img = this.add.image(CANVAS_W / 2, CANVAS_H / 2, key)
            .setOrigin(0.5);
          const tex = this.textures.get(key);
          const w = tex.source[0]?.width || 1;
          const h = tex.source[0]?.height || 1;
          const scale = Math.max(CANVAS_W / w, CANVAS_H / h);
          img.setScale(scale).setDepth(-10);
          return img;
        };
        if (this.textures.exists("stage_bg_specific") &&
            this.textures.get("stage_bg_specific").source[0]?.width > 4) {
          stretch("stage_bg_specific");
        } else {
          stretch("stage_bg_cof");
        }
        // Dim overlay so units pop. Subtle — 35% black is enough to keep
        // dark portraits legible without flattening the bg art entirely.
        this.add.rectangle(CANVAS_W / 2, CANVAS_H / 2, CANVAS_W, CANVAS_H, 0x000000, 0.35)
          .setDepth(-9);

        // Arena floor: subtle gradient strip on top of the bg.
        const floor = this.add.graphics().setDepth(-8);
        floor.fillStyle(0x14202b, 0.7);
        floor.fillRect(0, CANVAS_H - 80, CANVAS_W, 80);
        floor.fillStyle(0x1b2430, 0.5);
        floor.fillRect(0, CANVAS_H - 20, CANVAS_W, 20);

        // VS divider.
        this.add.text(CANVAS_W / 2, CANVAS_H / 2, "⚔", {
          fontSize: "56px", color: "#3a4555",
        }).setOrigin(0.5).setAlpha(0.5);

        this.buildUnits();

        // Caption at top.
        this.caption = this.add.text(CANVAS_W / 2, 32, "", {
          fontSize: "18px", color: "#ffd86b", fontFamily: "system-ui, sans-serif",
          fontStyle: "bold", backgroundColor: "rgba(0,0,0,0.55)",
          padding: { x: 14, y: 4 },
        }).setOrigin(0.5).setAlpha(0);

        // Floating result text (hidden until END event).
        this.resultText = this.add.text(CANVAS_W / 2, CANVAS_H / 2, "", {
          fontSize: "42px", color: "#fff", fontFamily: "system-ui, sans-serif",
          fontStyle: "bold", stroke: "#000", strokeThickness: 6,
        }).setOrigin(0.5).setAlpha(0);
      }

      buildUnits() {
        const sideA = this.battle.participants.filter(p => p.side === "A");
        const sideB = this.battle.participants.filter(p => p.side === "B");
        // Compact unit cards for up to 6 on a side.
        const place = (list, xBase, mirror) => {
          const gap = 90;
          const yStart = (CANVAS_H - 60) / 2 - (list.length - 1) * gap / 2;
          list.forEach((p, i) => {
            const x = xBase + (mirror ? -30 : 30);
            const y = yStart + i * gap;
            this.createUnit(p, x, y, mirror);
          });
        };
        place(sideA, 200, false);
        place(sideB, CANVAS_W - 200, true);
      }

      createUnit(p, x, y, mirror) {
        const roleTint = p.role === "ATK" ? 0xff7a59 : (p.role === "DEF" ? 0x59a0ff : 0x6dd39a);
        const container = this.add.container(x, y);
        container.uid = p.uid;

        // Portrait frame.
        const frame = this.add.rectangle(0, 0, 72, 72, 0x1b2430)
          .setStrokeStyle(2, roleTint);
        container.add(frame);

        // Portrait image — use template_code; fall back to placeholder.
        const texKey = this.resolveTexture(p.template_code);
        const portrait = this.add.image(0, 0, texKey).setDisplaySize(64, 64);
        if (mirror) portrait.setFlipX(true);
        container.add(portrait);

        // Name + level label below.
        const label = this.add.text(0, 44, `${p.name}`, {
          fontSize: "11px", color: "#ddd", fontFamily: "system-ui, sans-serif",
          fontStyle: "bold",
        }).setOrigin(0.5);
        container.add(label);
        const lvl = this.add.text(0, 56, `Lv${p.level}`, {
          fontSize: "10px", color: "#7d8a9c",
        }).setOrigin(0.5);
        container.add(lvl);

        // HP bar above portrait.
        const barBg = this.add.rectangle(0, -48, 74, 7, 0x0d1218).setStrokeStyle(1, 0x2d3847);
        const barFill = this.add.rectangle(-36, -48, 72, 5, 0x2ad06a).setOrigin(0, 0.5);
        const hpText = this.add.text(0, -58, `${p.max_hp}/${p.max_hp}`, {
          fontSize: "9px", color: "#ddd",
        }).setOrigin(0.5);
        container.add([barBg, barFill, hpText]);

        // Turn indicator ring (hidden by default).
        const ring = this.add.circle(0, 0, 42, 0xffd86b, 0).setStrokeStyle(3, 0xffd86b);
        ring.setAlpha(0);
        container.add(ring);

        // Status pill row (empty until effects apply).
        const statusRow = this.add.text(0, 70, "", {
          fontSize: "9px", color: "#b3c0d1",
        }).setOrigin(0.5);
        container.add(statusRow);

        this.state[p.uid] = {
          hp: p.max_hp, maxHp: p.max_hp,
          container, portrait, frame, barFill, hpText, statusRow, ring,
          dead: false, statuses: [],
          // Origin x/y so restart() can snap back if a lunge tween was killed.
          originX: x, originY: y,
        };
      }

      // --------------- playback --------------------------------------------
      applyEvent(e) {
        switch (e.type) {
          case "TURN":
            this.setActing(e.unit);
            if (typeof e.hp === "number" && this.state[e.unit]) {
              this.state[e.unit].hp = e.hp;
              this.updateHp(e.unit);
            }
            break;
          case "DAMAGE":
            // Three paths:
            //   1. Multi-hit special is in flight from this source → just play
            //      the hit visual on the target; the SPECIAL handler already
            //      lunged once and will slide back when hitsRemaining hits 0.
            //   2. Otherwise, known live source → standard lunge → hit-frame
            //      → return single-hit chain.
            //   3. Source unknown or dead (POISON/BURN ticks, REFLECT bounce
            //      onto attacker) → fire damage visual immediately.
            if (this.multiHitMode && this.multiHitMode.source === e.source) {
              this.doDamage(e.target, e.amount || 0, !!e.crit);
              this.multiHitMode.hitsRemaining--;
              if (this.multiHitMode.hitsRemaining <= 0) this._endMultiHit();
            } else if (e.source && this.state[e.source] && !this.state[e.source].dead) {
              this._animatedAttack(e.source, e.target, e.amount || 0, !!e.crit);
            } else {
              this.doDamage(e.target, e.amount || 0, !!e.crit);
            }
            break;
          case "HEAL":
            this.doHeal(e.target, e.amount || 0);
            break;
          case "DEATH":
            this.doDeath(e.unit);
            break;
          case "STATUS_APPLIED":
            this.addStatus(e.unit, e.kind, e.turns || 0);
            break;
          case "STATUS_EXPIRED":
            this.removeStatus(e.unit, e.kind);
            break;
          case "SPECIAL":
            this.setActing(e.unit);
            if (e.kind === "BOSS_PHASE") {
              // Boss phase change — full cinematic. Rest of the log is fine
              // to fire over the top once the banner has bloomed; the bg
              // flash + camera shake just sit on top for ~700ms.
              this.bossPhaseCinematic(e.unit, e.name || "Boss Phase");
            } else {
              this.floatText(e.unit, e.name || "special", 0xffd86b);
            }
            // Multi-hit / AOE peek: if 2+ DAMAGE events from this unit are
            // about to fire (hits=4 specials, AOE strikes), do one lunge
            // and stay forward through all hits — way punchier than 4
            // separate slide-in/slide-out cycles.
            if (e.kind === "DAMAGE" || e.kind === "AOE_DAMAGE" || e.kind === "BOSS_PHASE") {
              const hits = this._countUpcomingHits(e.unit);
              if (hits >= 2 && this.state[e.unit] && !this.state[e.unit].dead) {
                this._beginMultiHit(e.unit, hits);
              }
            }
            break;
          case "LIFESTEAL":
            this.floatText(e.unit, "+" + (e.amount || 0), 0x6dd39a);
            break;
          case "STUNNED":
            this.floatText(e.unit, "stunned!", 0xff6b4a);
            break;
          case "VIOLENT_TURN":
            this.floatText(e.unit, "violent!", 0xffd86b);
            break;
          case "CLEANSE":
            this.floatText(e.unit, "cleansed", 0x6dd39a);
            break;
          case "REVIVE":
            this.doRevive(e.target, e.hp);
            break;
          case "REVIVE_BLOCKED":
            // Heal-blocked corpse stays down. Show the "rez blocked" tag
            // hovering over the dead unit so the caller knows why their
            // expensive AOE_REVIVE went nowhere.
            this.floatText(e.target, "rez blocked", 0xff6b4a);
            break;
          case "FROZEN":
            // Frozen unit skips its turn this tick. Distinct from STUNNED
            // both in color and copy — FREEZE breaks on damage where STUN
            // doesn't, so the visual cue should hint at fragility.
            this.floatText(e.unit, "frozen", 0x6ec8ff);
            break;
          case "STATUS_BROKEN":
            // FREEZE shattered by damage. Cyan sparkle + brief shudder so
            // it reads as "the ice cracked" rather than "status faded out".
            this.floatText(e.unit, `${e.kind} broken`, 0x6ec8ff);
            this.removeStatus(e.unit, e.kind);
            break;
          case "HEAL_BLOCKED":
            // Inbound heal/lifesteal/revive suppressed by HEAL_BLOCK on the
            // target. Worth surfacing — the cleric just wasted a special.
            this.floatText(e.target, "heal blocked", 0xff6b4a);
            break;
          case "REFLECT":
            // REFLECT bounce-back: animate a beam from defender to attacker
            // so the cause-and-effect of the buff reads at a glance.
            this.reflectBeam(e.source, e.target, e.amount || 0);
            break;
          case "FACTION_SYNERGY":
            // Fires once per side at battle start. Pin a top banner long
            // enough to read so newcomers understand the +ATK/+DEF mod.
            this.factionSynergyBanner(e);
            break;
          case "HAIL_MARY": {
            // Once-per-battle desperation move at ≤5% HP. Drama dial up:
            // gold flash + screen shake + named banner over the unit.
            this.hailMaryCinematic(e.unit, e.name || "Hail Mary", e.role);
            // DEF role emits N DAMAGE events (one per enemy). Without a peek-
            // ahead the attacker would lunge once per hit. ATK emits 1 DAMAGE
            // (single _animatedAttack covers it), SUP emits HEAL events (no
            // lunge needed). The 2+ guard naturally selects DEF only.
            const hits = this._countUpcomingHits(e.unit);
            if (hits >= 2 && this.state[e.unit] && !this.state[e.unit].dead) {
              this._beginMultiHit(e.unit, hits);
            }
            break;
          }
          case "WAVE_START":
            this.showCaption(`Wave ${e.wave}`, 1100);
            break;
          case "END":
            this.showCaption(`Battle ${e.outcome}`, 1500);
            this.setActing(null);
            break;
          case "log_truncated":
            this.showCaption(`... ${e.skipped} events skipped ...`, 900);
            break;
        }
        this.updateProgress();
      }

      setActing(uid) {
        for (const u of Object.values(this.state)) {
          this.tweens.add({ targets: u.ring, alpha: 0, duration: 120 });
        }
        if (!uid || !this.state[uid]) return;
        this.tweens.add({
          targets: this.state[uid].ring,
          alpha: { from: 0, to: 1 },
          duration: 160,
        });
      }

      doDamage(uid, amount, crit = false) {
        const s = this.state[uid]; if (!s) return;
        s.hp = Math.max(0, s.hp - amount);
        this.updateHp(uid);
        // Shake the container briefly.
        const baseX = s.container.x;
        this.tweens.add({
          targets: s.container, x: baseX - 6, yoyo: true, duration: 60, repeat: 1,
          onComplete: () => { s.container.x = baseX; },
        });
        // Red flash on frame, then restore the status-aware tint (or role
        // tint if nothing dramatic is active).
        s.frame.setStrokeStyle(3, 0xff6b4a);
        this.time.delayedCall(200, () => {
          this._updateFrameTint(uid);
        });
        this.damageNumber(uid, amount, crit);
      }

      // Peek ahead in the event log: count consecutive DAMAGE events from
      // `sourceUid` that are about to fire. DEATH and STATUS_APPLIED events
      // don't break the chain (they sit between AOE damage hits). Stop at
      // any event that signals end-of-actor (TURN, SPECIAL, END, VIOLENT_TURN,
      // BOSS_PHASE, FACTION_SYNERGY, WAVE_START) or a DAMAGE from a different
      // source. Cursor still points at the SPECIAL when this is called, so
      // we scan from cursor+1 forward.
      _countUpcomingHits(sourceUid) {
        const STOP = new Set([
          "TURN", "SPECIAL", "END", "VIOLENT_TURN", "WAVE_START",
        ]);
        let count = 0;
        for (let i = this.cursor + 1; i < this.battle.log.length; i++) {
          const ev = this.battle.log[i];
          if (STOP.has(ev.type)) break;
          if (ev.type === "DAMAGE") {
            if (ev.source === sourceUid) count++;
            else break;     // damage from someone else = chain ended
          }
          // DEATH / STATUS_APPLIED / STATUS_EXPIRED / FROZEN / etc. pass through.
        }
        return count;
      }

      // Lunge the attacker forward and stay there for the duration of a
      // multi-hit run. The DAMAGE handler decrements hitsRemaining as each
      // event fires; when it hits 0, _endMultiHit slides back and clears.
      _beginMultiHit(sourceUid, hitCount) {
        const a = this.state[sourceUid];
        if (!a) return;
        this.attackInFlight = true;
        const baseX = a.originX != null ? a.originX : a.container.x;
        // Lunge toward enemy side. Side A heroes are on the left, B on right.
        const lungeX = (baseX < CANVAS_W / 2) ? baseX + 70 : baseX - 70;
        const lungeMs = Math.max(60, this.speedMs * 0.30);
        this.tweens.add({
          targets: a.container, x: lungeX,
          duration: lungeMs, ease: "Quad.out",
        });
        this.multiHitMode = {
          source: sourceUid,
          hitsRemaining: hitCount,
          baseX,
        };
      }

      _endMultiHit() {
        if (!this.multiHitMode) { this.attackInFlight = false; return; }
        const a = this.state[this.multiHitMode.source];
        const baseX = this.multiHitMode.baseX;
        this.multiHitMode = null;
        if (!a) { this.attackInFlight = false; return; }
        const returnMs = Math.max(70, this.speedMs * 0.35);
        this.tweens.add({
          targets: a.container, x: baseX,
          duration: returnMs, ease: "Quad.in",
          onComplete: () => { this.attackInFlight = false; },
        });
      }

      // Lunge → hit-frame → slide back. Returns nothing; sets attackInFlight
      // for the duration so play() waits before advancing the event cursor.
      // Animation durations scale with speedMs so 5× playback compresses
      // gracefully instead of dragging behind the timer.
      _animatedAttack(sourceUid, targetUid, amount, crit) {
        const a = this.state[sourceUid], t = this.state[targetUid];
        if (!a || !t) { this.doDamage(targetUid, amount, crit); return; }
        this.attackInFlight = true;
        const baseX = a.container.x;
        // 22% of the way toward the target — visible lunge, doesn't overlap.
        const lungeX = baseX + (t.container.x - baseX) * 0.22;
        // Fast at high speed, more weight at slow speed. Floor at 50ms so
        // tweens always feel like a step, never a snap.
        const lungeMs = Math.max(50, this.speedMs * 0.25);
        const returnMs = Math.max(60, this.speedMs * 0.30);
        this.tweens.add({
          targets: a.container, x: lungeX,
          duration: lungeMs, ease: "Quad.out",
          onComplete: () => {
            // HIT-FRAME: damage visual lands now, on contact.
            this.doDamage(targetUid, amount, crit);
            this.tweens.add({
              targets: a.container, x: baseX,
              duration: returnMs, ease: "Quad.in",
              onComplete: () => { this.attackInFlight = false; },
            });
          },
        });
      }

      // DamagePopup-style: scale up to 130%, scale back to 100%, fade out.
      // Crit variant ramps the font size + color (red instead of orange).
      // Lifecycle pattern lifted from CodeMonkey TurnBattleSystem DamagePopup.cs.
      damageNumber(uid, amount, crit) {
        const s = this.state[uid]; if (!s) return;
        const baseSize = crit ? 32 : 24;
        const color = crit ? "#ff2b00" : "#ffc500";
        const t = this.add.text(s.container.x, s.container.y - 30,
          (crit ? "✦" : "") + amount, {
            fontSize: `${baseSize}px`, color: color,
            fontStyle: "bold", stroke: "#000", strokeThickness: 4,
          }).setOrigin(0.5).setDepth(100).setScale(0.4);
        this.tweens.add({
          targets: t,
          scale: { from: 0.4, to: 1.3 },
          y: s.container.y - 50,
          duration: 200, ease: "Back.out",
          onComplete: () => {
            this.tweens.add({
              targets: t,
              scale: 1.0,
              y: s.container.y - 65,
              duration: 200, ease: "Quad.in",
              onComplete: () => {
                this.tweens.add({
                  targets: t,
                  alpha: 0, y: s.container.y - 85,
                  duration: 350, ease: "Quad.in",
                  onComplete: () => t.destroy(),
                });
              },
            });
          },
        });
      }

      doHeal(uid, amount) {
        const s = this.state[uid]; if (!s) return;
        s.hp = Math.min(s.maxHp, s.hp + amount);
        this.updateHp(uid);
        this.floatText(uid, "+" + amount, 0x6dd39a);
      }

      doDeath(uid) {
        const s = this.state[uid]; if (!s) return;
        s.dead = true;
        s.hp = 0;
        this.updateHp(uid);
        this.tweens.add({
          targets: s.container, alpha: 0.3, duration: 300,
        });
        // KO stamp.
        const ko = this.add.text(s.container.x, s.container.y, "KO", {
          fontSize: "28px", color: "#ff6b4a", fontStyle: "bold",
          stroke: "#000", strokeThickness: 4,
        }).setOrigin(0.5).setAngle(-12).setAlpha(0);
        this.tweens.add({
          targets: ko, alpha: 1, duration: 200, yoyo: false,
        });
        s.koStamp = ko;
      }

      doRevive(uid, hp) {
        const s = this.state[uid]; if (!s) return;
        s.dead = false;
        if (typeof hp === "number") s.hp = hp;
        this.updateHp(uid);
        this.tweens.add({ targets: s.container, alpha: 1, duration: 300 });
        if (s.koStamp) { s.koStamp.destroy(); s.koStamp = null; }
        this.floatText(uid, "revived!", 0x6dd39a);
      }

      updateHp(uid) {
        const s = this.state[uid]; if (!s) return;
        const pct = Math.max(0, s.hp / s.maxHp);
        const fullW = 72;
        this.tweens.add({
          targets: s.barFill, width: fullW * pct, duration: 200,
        });
        // Color bands.
        const color = pct > 0.5 ? 0x2ad06a : (pct > 0.25 ? 0xd6a02a : 0xd64a2a);
        s.barFill.fillColor = color;
        s.hpText.setText(`${Math.max(0, Math.floor(s.hp))}/${s.maxHp}`);
      }

      addStatus(uid, kind, turns) {
        const s = this.state[uid]; if (!s) return;
        s.statuses.push({ kind, turns });
        this.renderStatuses(uid);
      }
      removeStatus(uid, kind) {
        const s = this.state[uid]; if (!s) return;
        s.statuses = s.statuses.filter(x => x.kind !== kind);
        this.renderStatuses(uid);
      }
      renderStatuses(uid) {
        const s = this.state[uid]; if (!s) return;
        // Color-coded glyphs per status kind. Glyphs are intrinsically
        // colorful (emoji), so the row stays readable without inline color
        // markup. Unknown kinds fall back to their literal name so a new
        // backend status type degrades gracefully instead of disappearing.
        const glyphs = s.statuses
          .map(x => BattleScene.STATUS_GLYPH[x.kind] || x.kind)
          .join(" ");
        s.statusRow.setText(glyphs);
        this._updateFrameTint(uid);
      }

      // Frame stroke color picks the highest-priority active status so the
      // viewer can see at a glance who's frozen / burning / heal-blocked
      // without parsing the glyph row. Falls back to role tint when nothing
      // dramatic is active. Skipped while a damage-flash is in progress
      // (doDamage owns the frame for 200ms after each hit).
      _updateFrameTint(uid) {
        const s = this.state[uid]; if (!s || s.dead) return;
        const kinds = new Set(s.statuses.map(x => x.kind));
        // Priority order: hard-CC > damage-over-time > debilitator > buff.
        let color = null;
        if (kinds.has("FREEZE"))         color = 0x6ec8ff;     // cyan
        else if (kinds.has("STUN"))      color = 0xffe066;     // pale yellow
        else if (kinds.has("BURN"))      color = 0xff8a3c;     // orange
        else if (kinds.has("POISON"))    color = 0x8fdc4a;     // venom green
        else if (kinds.has("HEAL_BLOCK"))color = 0xc04a8a;     // magenta
        else if (kinds.has("REFLECT"))   color = 0xc080ff;     // mirror purple
        else if (kinds.has("SHIELD"))    color = 0xc0c8d0;     // silver
        else if (kinds.has("DEF_DOWN"))  color = 0x4a90ff;     // ice blue
        else if (kinds.has("ATK_UP"))    color = 0xffd86b;     // gold
        if (color === null) color = this.participantRoleTint(uid);
        s.frame.setStrokeStyle(2, color);
      }

      // Lightweight beam from defender to attacker showing a REFLECT bounce.
      // Pure Graphics line + fade — no asset, no extra deps.
      reflectBeam(attackerUid, defenderUid, amount) {
        const a = this.state[attackerUid], d = this.state[defenderUid];
        if (!a || !d) {
          if (d) this.floatText(defenderUid, "reflect!", 0xc080ff);
          return;
        }
        const g = this.add.graphics().setDepth(90);
        g.lineStyle(3, 0xc080ff, 1.0);
        g.beginPath();
        g.moveTo(d.container.x, d.container.y);
        g.lineTo(a.container.x, a.container.y);
        g.strokePath();
        this.tweens.add({
          targets: g, alpha: { from: 1, to: 0 },
          duration: 380, ease: "Quad.in",
          onComplete: () => g.destroy(),
        });
        this.floatText(defenderUid, "reflect!", 0xc080ff);
        if (amount > 0) this.floatText(attackerUid, "-" + amount, 0xc080ff, 18);
      }

      // Hail-mary cinematic — gold flash (lighter than boss-phase red),
      // mid-camera shake, role-flavored name banner over the dying unit.
      // Distinct color from BOSS_PHASE so they don't read the same.
      hailMaryCinematic(uid, name, role) {
        const flash = this.add.rectangle(
          CANVAS_W / 2, CANVAS_H / 2, CANVAS_W, CANVAS_H, 0xffd86b, 0.40
        ).setDepth(200);
        this.tweens.add({
          targets: flash, alpha: 0, duration: 450, ease: "Quad.in",
          onComplete: () => flash.destroy(),
        });
        this.cameras.main.shake(280, 0.008);
        const s = this.state[uid];
        const bx = s ? s.container.x : CANVAS_W / 2;
        const by = s ? s.container.y : CANVAS_H / 2;
        const banner = this.add.text(bx, by - 80, name.toUpperCase(), {
          fontSize: "28px", color: "#ffd86b",
          fontFamily: "system-ui, sans-serif", fontStyle: "bold",
          stroke: "#000", strokeThickness: 5,
          backgroundColor: "rgba(0,0,0,0.65)",
          padding: { x: 14, y: 6 },
        }).setOrigin(0.5).setAlpha(0).setScale(1.4).setDepth(210);
        this.tweens.add({
          targets: banner,
          alpha: { from: 0, to: 1 },
          scale: { from: 1.4, to: 1.0 },
          duration: 220, ease: "Back.out",
          onComplete: () => {
            this.time.delayedCall(750, () => {
              this.tweens.add({
                targets: banner, alpha: 0, y: by - 110,
                duration: 320, ease: "Quad.in",
                onComplete: () => banner.destroy(),
              });
            });
          },
        });
      }

      // Boss phase change — drama dial up. Red flash washes the canvas, the
      // camera shakes, and a name banner blooms in the middle. Used only by
      // raid-boss BOSS_PHASE specials; hero specials still use the modest
      // yellow floatText. The flash + shake stack on top of regular events
      // (the AOE damage hits firing immediately after) so timing stays tight.
      bossPhaseCinematic(uid, name) {
        // Full-screen red flash.
        const flash = this.add.rectangle(
          CANVAS_W / 2, CANVAS_H / 2, CANVAS_W, CANVAS_H, 0xff3300, 0.55
        ).setDepth(200);
        this.tweens.add({
          targets: flash, alpha: 0, duration: 500, ease: "Quad.in",
          onComplete: () => flash.destroy(),
        });
        // Camera shake — meaty.
        this.cameras.main.shake(380, 0.012);
        // Name banner — slams in from above, lingers, fades.
        const banner = this.add.text(CANVAS_W / 2, CANVAS_H / 2 - 40, name, {
          fontSize: "44px", color: "#ffffff",
          fontFamily: "system-ui, sans-serif", fontStyle: "bold",
          stroke: "#7a0000", strokeThickness: 8,
          backgroundColor: "rgba(0,0,0,0.75)",
          padding: { x: 24, y: 10 },
        }).setOrigin(0.5).setAlpha(0).setScale(1.6).setDepth(210);
        this.tweens.add({
          targets: banner,
          alpha: { from: 0, to: 1 },
          scale: { from: 1.6, to: 1.0 },
          duration: 250, ease: "Back.out",
          onComplete: () => {
            this.time.delayedCall(900, () => {
              this.tweens.add({
                targets: banner, alpha: 0, y: CANVAS_H / 2 - 70,
                duration: 350, ease: "Quad.in",
                onComplete: () => banner.destroy(),
              });
            });
          },
        });
        // Pulse the boss's selection ring brighter so the eye lands on them.
        const s = this.state[uid];
        if (s) {
          this.tweens.add({
            targets: s.ring, alpha: { from: 1, to: 0.4 },
            duration: 300, yoyo: true, repeat: 1,
          });
        }
      }

      // Top banner shown once per side when their faction synergy kicks in.
      // Reads as: "HELPDESK ×3  →  +10% ATK". Stacks vertically for the rare
      // case where both sides synergize on the same battle.
      factionSynergyBanner(e) {
        const atkPct = Math.round((e.atk_pct || 0) * 100);
        const defPct = Math.round((e.def_pct || 0) * 100);
        const sideLabel = e.side === "A" ? "Your team" : "Enemy team";
        const sideColor = e.side === "A" ? "#6dd39a" : "#ff7a59";
        const bonus = [
          atkPct > 0 ? `+${atkPct}% ATK` : null,
          defPct > 0 ? `+${defPct}% DEF` : null,
        ].filter(Boolean).join(" / ");
        // Stack: side A gets y=70, side B gets y=100.
        const y = e.side === "A" ? 70 : 100;
        const text = this.add.text(CANVAS_W / 2,
          y,
          `${sideLabel}: ${e.faction} ×${e.count}  →  ${bonus}`, {
            fontSize: "14px", color: sideColor,
            fontFamily: "system-ui, sans-serif", fontStyle: "bold",
            backgroundColor: "rgba(0,0,0,0.7)",
            padding: { x: 12, y: 4 },
          }).setOrigin(0.5).setAlpha(0).setDepth(80);
        this.tweens.add({
          targets: text, alpha: 1, duration: 200,
          onComplete: () => {
            this.time.delayedCall(2200, () => {
              this.tweens.add({
                targets: text, alpha: 0, duration: 400,
                onComplete: () => text.destroy(),
              });
            });
          },
        });
      }

      floatText(uid, text, color, size = 18) {
        const s = this.state[uid]; if (!s) return;
        const t = this.add.text(s.container.x, s.container.y - 30, text, {
          fontSize: `${size}px`, color: Phaser.Display.Color.IntegerToColor(color).rgba,
          fontStyle: "bold", stroke: "#000", strokeThickness: 3,
        }).setOrigin(0.5).setDepth(100);
        this.tweens.add({
          targets: t,
          y: s.container.y - 70,
          alpha: { from: 1, to: 0 },
          duration: 900, ease: "Quad.out",
          onComplete: () => t.destroy(),
        });
      }

      repositionUnits() {
        for (const s of Object.values(this.state)) {
          s.container.x = s.originX;
          s.container.y = s.originY;
        }
      }

      participantRoleTint(uid) {
        const p = this.battle.participants.find(x => x.uid === uid);
        if (!p) return 0x7d8a9c;
        return p.role === "ATK" ? 0xff7a59 : (p.role === "DEF" ? 0x59a0ff : 0x6dd39a);
      }

      showCaption(text, ttl) {
        this.caption.setText(text).setAlpha(1);
        this.time.delayedCall(ttl, () => {
          this.tweens.add({ targets: this.caption, alpha: 0, duration: 200 });
        });
      }

      // --------------- controls --------------------------------------------
      stepOnce() {
        if (this.cursor >= this.battle.log.length) return false;
        this.applyEvent(this.battle.log[this.cursor]);
        this.cursor++;
        return true;
      }

      play() {
        if (this.playing) return;
        this.playing = true;
        document.getElementById("btn-play").textContent = "⏸ Pause";
        const tick = () => {
          if (!this.playing) return;
          // If an attack chain is mid-lunge, poll back in shortly instead of
          // firing the next event over the top of it.
          if (this.attackInFlight) {
            this.timer = this.time.delayedCall(30, tick);
            return;
          }
          if (!this.stepOnce()) { this.pause(); this.showResult(); return; }
          this.timer = this.time.delayedCall(this.speedMs, tick);
        };
        tick();
      }

      pause() {
        this.playing = false;
        if (this.timer) { this.timer.remove(); this.timer = null; }
        document.getElementById("btn-play").textContent = "▶ Play";
      }

      restart() {
        this.pause();
        // Cancel any in-flight attack chain so containers snap back to base.
        this.tweens.killAll();
        this.attackInFlight = false;
        this.multiHitMode = null;
        // Reset state in place.
        for (const p of this.battle.participants) {
          const s = this.state[p.uid];
          s.hp = p.max_hp; s.dead = false; s.statuses = [];
          s.container.alpha = 1;
          if (s.koStamp) { s.koStamp.destroy(); s.koStamp = null; }
          this.updateHp(p.uid); this.renderStatuses(p.uid);
          s.ring.setAlpha(0);
          s.frame.setStrokeStyle(2, this.participantRoleTint(p.uid));
        }
        // Snap units back to their original positions in case a lunge tween
        // was killed mid-flight. buildUnits placed them at fixed x; recompute
        // the same layout to restore.
        this.repositionUnits();
        this.cursor = 0;
        this.resultText.setAlpha(0);
        document.getElementById("result").innerHTML = "";
        this.updateProgress();
      }

      updateProgress() {
        document.getElementById("progress").textContent =
          `${this.cursor} / ${this.battle.log.length} events`;
      }

      showResult() {
        const b = this.battle;
        const cls = b.outcome === "WIN" ? "win" : (b.outcome === "LOSS" ? "loss" : "draw");
        const rewards = b.rewards || {};
        const bits = [];
        if (rewards.gems) bits.push(`+${rewards.gems} 💎`);
        if (rewards.coins) bits.push(`+${rewards.coins} coins`);
        if (rewards.shards) bits.push(`+${rewards.shards} ✦`);
        if (rewards.xp) bits.push(`+${rewards.xp} xp`);
        if (rewards.gear) bits.push(`gear: ${rewards.gear.rarity} ${rewards.gear.slot}`);
        if (b.first_clear) bits.push("first-clear bonus");
        document.getElementById("result").innerHTML =
          `<span class="${cls}"><strong>${b.outcome}</strong></span>${bits.length ? " — " + bits.join(", ") : ""}`;
        // Big text in-canvas.
        this.resultText.setText(b.outcome)
          .setColor(cls === "win" ? "#6dd39a" : (cls === "loss" ? "#ff6b4a" : "#ffd86b"));
        this.tweens.add({
          targets: this.resultText, alpha: 1, scale: { from: 0.5, to: 1.0 },
          duration: 400, ease: "Back.out",
        });
      }
    }

    // --------------- boot -----------------------------------------------------
    (async () => {
      if (!battleId) {
        document.getElementById("loading").textContent = "missing ?id=N in URL";
        return;
      }
      try {
        const battle = await loadBattle(battleId);
        document.getElementById("loading").remove();
        document.getElementById("controls").style.display = "flex";

        const game = new Phaser.Game({
          type: Phaser.AUTO, width: CANVAS_W, height: CANVAS_H,
          parent: "game", backgroundColor: "#0b0d10",
          scene: BattleScene, scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        });
        game.scene.start("battle", { battle });

        // Wait one frame so scene exists.
        await new Promise(r => setTimeout(r, 100));
        const scene = game.scene.getScene("battle");
        scene.scene.events.on("create", () => scene.restart());

        document.getElementById("btn-play").addEventListener("click", () => {
          scene.playing ? scene.pause() : scene.play();
        });
        document.getElementById("btn-step").addEventListener("click", () => {
          scene.pause();
          if (!scene.stepOnce()) scene.showResult();
        });
        document.getElementById("btn-restart").addEventListener("click", () => scene.restart());
        document.getElementById("speed").addEventListener("change", (e) => {
          scene.speedMs = Number(e.target.value);
        });
      } catch (e) {
        document.getElementById("loading").innerHTML =
          `<span style="color:#ff6b4a">load failed: ${e.message}</span>`;
      }
    })();
  </script>
</body>
</html>
