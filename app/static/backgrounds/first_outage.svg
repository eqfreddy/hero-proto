<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <style>
    .alert-line { fill: #3a4555; }
    .bg { fill: #14202b; }
    .monitor { fill: #ff6b4a; opacity: 0.6; }
    .monitor-border { fill: #ff6b4a; opacity: 0.6; }
    .noc-wall { fill: #2d3847; }
    .screen-glow { fill: #ffd86b; opacity: 0.4; }
    .screen-red { fill: #ff6b4a; opacity: 0.6; }
    .text-alert { fill: #3a4555; }
  </style>
<defs>
    
  </defs>
  
  
  <rect width="1280" height="720" class="bg"></rect>
  
  
  <rect x="0" y="0" width="1280" height="720" class="noc-wall"></rect>
  
  
  <line x1="100" y1="0" x2="100" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  <line x1="300" y1="0" x2="300" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  <line x1="500" y1="0" x2="500" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  <line x1="700" y1="0" x2="700" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  <line x1="900" y1="0" x2="900" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  <line x1="1100" y1="0" x2="1100" y2="720" stroke="#0b0d10" stroke-width="2" opacity="0.2"></line>
  
  
  
  
  <g class="screen-glow">
    <rect x="50" y="40" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="56" y="46" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="50" y="40" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="80" y="85" class="text-alert">OUTAGE</text>
  <line x1="65" y1="120" x2="315" y2="120" class="alert-line"></line>
  <line x1="65" y1="135" x2="310" y2="135" class="alert-line"></line>
  <line x1="65" y1="150" x2="315" y2="150" class="alert-line"></line>
  
  
  <g class="screen-glow">
    <rect x="380" y="40" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="386" y="46" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="380" y="40" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="410" y="85" class="text-alert">CRITICAL</text>
  <line x1="395" y1="120" x2="645" y2="120" class="alert-line"></line>
  <line x1="395" y1="135" x2="640" y2="135" class="alert-line"></line>
  <line x1="395" y1="150" x2="645" y2="150" class="alert-line"></line>
  
  
  <g class="screen-glow">
    <rect x="710" y="40" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="716" y="46" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="710" y="40" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="740" y="85" class="text-alert">DOWN</text>
  <line x1="725" y1="120" x2="975" y2="120" class="alert-line"></line>
  <line x1="725" y1="135" x2="970" y2="135" class="alert-line"></line>
  <line x1="725" y1="150" x2="975" y2="150" class="alert-line"></line>
  
  
  
  <g class="screen-glow">
    <rect x="50" y="320" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="56" y="326" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="50" y="320" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="80" y="365" class="text-alert">FAILURE</text>
  <line x1="65" y1="400" x2="315" y2="400" class="alert-line"></line>
  <line x1="65" y1="415" x2="310" y2="415" class="alert-line"></line>
  <line x1="65" y1="430" x2="315" y2="430" class="alert-line"></line>
  
  
  <g class="screen-glow">
    <rect x="380" y="320" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="386" y="326" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="380" y="320" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="410" y="365" class="text-alert">ERROR</text>
  <line x1="395" y1="400" x2="645" y2="400" class="alert-line"></line>
  <line x1="395" y1="415" x2="640" y2="415" class="alert-line"></line>
  <line x1="395" y1="430" x2="645" y2="430" class="alert-line"></line>
  
  
  <g class="screen-glow">
    <rect x="710" y="320" width="280" height="200" class="monitor" rx="8"></rect>
    <rect x="716" y="326" width="268" height="188" class="screen-red" rx="6"></rect>
  </g>
  <rect x="710" y="320" width="280" height="200" class="monitor-border" fill="none" rx="8"></rect>
  <text x="740" y="365" class="text-alert">ALERT</text>
  <line x1="725" y1="400" x2="975" y2="400" class="alert-line"></line>
  <line x1="725" y1="415" x2="970" y2="415" class="alert-line"></line>
  <line x1="725" y1="430" x2="975" y2="430" class="alert-line"></line>
</svg>