<svg xmlns="http://www.w3.org/2000/svg" width="680" height="383" viewBox="0 0 680 383">
  <!-- CLUSTER OF FUCKERY — Background: Server Closet -->
  <!-- Dark server room, two racks, patch cables, status LEDs, posters -->

  <!-- Room base -->
  <rect width="680" height="383" fill="#111318"/>
  <rect x="0" y="370" width="680" height="13" fill="#0d0f14"/>
  <rect x="0" y="0" width="680" height="28" fill="#0a0c10"/>

  <!-- Ceiling cable tray -->
  <rect x="60" y="22" width="560" height="8" rx="2" fill="#1a1a28" stroke="#2a2a44" stroke-width="1"/>
  <line x1="100" y1="22" x2="100" y2="30" stroke="#2a2a44" stroke-width="1"/>
