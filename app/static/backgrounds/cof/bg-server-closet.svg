  <path d="M477,81 Q441,73 400,81" fill="none" stroke="#cc2222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M477,97 Q439,89 400,97" fill="none" stroke="#22cc44" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sticky note on rack 2: DO NOT REBOOT until Friday — Dave (left co.) -->
  <rect x="500" y="290" width="70" height="52" rx="2" fill="#ffee88" stroke="#e8d840" stroke-width="1" transform="rotate(-2,535,316)"/>
  <text x="535" y="307" text-anchor="middle" font-family="monospace" font-size="7" fill="#664" transform="rotate(-2,535,316)">DO NOT</text>
  <text x="535" y="318" text-anchor="middle" font-family="monospace" font-size="7" fill="#664" transform="rotate(-2,535,316)">REBOOT</text>
  <text x="535" y="329" text-anchor="middle" font-family="monospace" font-size="7" fill="#884" transform="rotate(-2,535,316)">until Friday</text>
  <text x="535" y="340" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa" transform="rotate(-2,535,316)">— Dave (left co.)</text>

  <!-- Fire extinguisher -->
  <rect x="650" y="300" width="18" height="50" rx="4" fill="#cc2222" stroke="#aa1111" stroke-width="2"/>
  <rect x="652" y="296" width="14" height="8" rx="2" fill="#882222" stroke="#661111" stroke-width="1"/>

  <!-- Floor cable runs between racks -->
  <path d="M203,350 Q300,344 395,350 Q460,354 475,350" fill="none" stroke="#2255cc" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M203,360 Q295,354 390,360 Q455,364 475,360" fill="none" stroke="#cc2222" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
