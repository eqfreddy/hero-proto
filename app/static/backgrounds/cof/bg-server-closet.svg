  <text x="415" y="96" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">*excl. planned outages</text>
  <text x="415" y="108" text-anchor="middle" font-family="monospace" font-size="6" fill="#666">*excl. that one tuesday</text>
  <rect x="411" y="46" width="8" height="6" rx="1" fill="#555"/>

