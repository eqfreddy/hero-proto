  <circle cx="493" cy="66" r="3" fill="#00ff44" opacity="0.9"/>
  <circle cx="501" cy="66" r="3" fill="#00ff44" opacity="0.9"/>
  <circle cx="493" cy="81" r="3" fill="#ffaa00" opacity="0.9"/>
  <circle cx="493" cy="97" r="3" fill="#00ff44" opacity="0.9"/>
  <circle cx="493" cy="124" r="3" fill="#ff4444" opacity="0.9"/>
  <circle cx="501" cy="124" r="3" fill="#ff4444" opacity="0.9"/>
  <circle cx="493" cy="139" r="3" fill="#ff4444" opacity="0.9"/>
  <circle cx="493" cy="181" r="3" fill="#00ff44" opacity="0.9"/>
