  <path d="M200,66 Q240,58 280,66" fill="none" stroke="#2255cc" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M200,81 Q235,73 280,81" fill="none" stroke="#cc2222" stroke-width="3.5" stroke-linecap="round"/>
