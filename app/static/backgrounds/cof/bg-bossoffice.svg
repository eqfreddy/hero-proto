<svg xmlns="http://www.w3.org/2000/svg" width="680" height="383" viewBox="0 0 680 383">
  <!-- CLUSTER OF FUCKERY — Background: Boss's Office -->
  <!-- Walls: warm corporate beige -->
  <rect width="680" height="383" fill="#cfc0a8"/>
  <!-- Crown moulding -->
  <rect x="0" y="0" width="680" height="22" fill="#b8a890"/>
  <rect x="0" y="20" width="680" height="3" fill="#a09078"/>
  <!-- Wainscoting lower panel -->
  <rect x="0" y="310" width="680" height="4" fill="#a09078"/>
  <rect x="0" y="314" width="680" height="56" fill="#b8a078"/>
  <!-- Floor: dark carpet -->
  <rect x="0" y="370" width="680" height="13" fill="#6a5a48"/>

  <!-- Window with blinds — left wall -->
  <rect x="28" y="38" width="130" height="100" rx="3" fill="#b8d4e8" stroke="#8a7858" stroke-width="3"/>
  <!-- Blind slats -->
  <line x1="28" y1="52" x2="158" y2="52" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="62" x2="158" y2="62" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="72" x2="158" y2="72" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="82" x2="158" y2="82" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="92" x2="158" y2="92" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="102" x2="158" y2="102" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="112" x2="158" y2="112" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="122" x2="158" y2="122" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <line x1="28" y1="132" x2="158" y2="132" stroke="#d8c8a8" stroke-width="2" opacity="0.8"/>
  <!-- Window frame -->
  <rect x="88" y="38" width="3" height="100" fill="#8a7858"/>
  <rect x="28" y="88" width="130" height="3" fill="#8a7858"/>
  <!-- Curtain rods + valance -->
  <rect x="22" y="35" width="142" height="6" rx="2" fill="#8a7858"/>
  <rect x="22" y="35" width="10" height="10" rx="5" fill="#7a6848"/>
  <rect x="154" y="35" width="10" height="10" rx="5" fill="#7a6848"/>

  <!-- American flag — left corner -->
  <rect x="188" y="25" width="2" height="120" fill="#888"/>
  <rect x="190" y="26" width="46" height="30" fill="#b22234"/>
  <rect x="190" y="30" width="46" height="4" fill="#fff"/>
  <rect x="190" y="38" width="46" height="4" fill="#fff"/>
  <rect x="190" y="46" width="46" height="4" fill="#fff"/>
  <rect x="190" y="26" width="22" height="18" fill="#3c3b6e"/>
  <circle cx="196" cy="30" r="1.2" fill="#fff"/>
  <circle cx="202" cy="30" r="1.2" fill="#fff"/>
  <circle cx="208" cy="30" r="1.2" fill="#fff"/>
  <circle cx="196" cy="36" r="1.2" fill="#fff"/>
  <circle cx="202" cy="36" r="1.2" fill="#fff"/>
  <circle cx="208" cy="36" r="1.2" fill="#fff"/>

  <!-- Framed certificate 1: "Excellence in Management" -->
  <rect x="28" y="165" width="100" height="72" rx="2" fill="#f4ece0" stroke="#8a7040" stroke-width="3"/>
  <rect x="33" y="170" width="90" height="62" rx="1" fill="#fdf8f0" stroke="#b09050" stroke-width="1"/>
  <text x="78" y="184" text-anchor="middle" font-family="serif" font-size="6" fill="#6a5030" font-style="italic">CERTIFICATE OF</text>
  <text x="78" y="193" text-anchor="middle" font-family="serif" font-size="7" fill="#4a3820" font-weight="bold">EXCELLENCE</text>
  <text x="78" y="202" text-anchor="middle" font-family="serif" font-size="5" fill="#6a5030">in</text>
  <text x="78" y="211" text-anchor="middle" font-family="serif" font-size="6" fill="#4a3820">MANAGEMENT</text>
  <text x="78" y="222" text-anchor="middle" font-family="serif" font-size="5" fill="#888">Awarded to D. Mangement</text>
  <text x="78" y="230" text-anchor="middle" font-family="serif" font-size="4.5" fill="#aaa">for showing up since 1994</text>
  <rect x="63" y="232" width="30" height="1" fill="#b09050"/>
  <rect x="56" y="35" width="10" height="10" rx="5" fill="none"/>

  <!-- Framed golf photo -->
  <rect x="143" y="165" width="76" height="72" rx="2" fill="#eee" stroke="#8a7040" stroke-width="3"/>
  <rect x="148" y="170" width="66" height="57" rx="1" fill="#6a9a5a"/>
  <!-- Golf course sky -->
  <rect x="148" y="170" width="66" height="20" rx="1" fill="#a8c8e8"/>
  <!-- Cloud -->
  <ellipse cx="162" cy="177" rx="8" ry="4" fill="#fff" opacity="0.8"/>
  <!-- Golf course green -->
  <ellipse cx="180" cy="205" rx="14" ry="6" fill="#5a9a4a"/>
  <!-- Flag -->
  <line x1="182" y1="199" x2="182" y2="190" stroke="#aaa" stroke-width="1"/>
  <rect x="182" y="190" width="8" height="5" fill="#e44"/>
  <!-- Silhouette -->
  <ellipse cx="168" cy="198" rx="4" ry="5" fill="#3a2a1a"/>
  <line x1="168" y1="203" x2="168" y2="215" stroke="#3a2a1a" stroke-width="2"/>
  <line x1="168" y1="208" x2="162" y2="214" stroke="#3a2a1a" stroke-width="1.5"/>
  <line x1="168" y1="215" x2="162" y2="224" stroke="#3a2a1a" stroke-width="2"/>
  <line x1="168" y1="215" x2="174" y2="224" stroke="#3a2a1a" stroke-width="2"/>
  <text x="181" y="234" text-anchor="middle" font-family="serif" font-size="5" fill="#6a5030">Pebble Beach '02</text>

  <!-- "LEADERSHIP" motivational poster -->
  <rect x="28" y="252" width="191" height="55" rx="2" fill="#1a2a3a" stroke="#8a7040" stroke-width="2"/>
  <rect x="31" y="255" width="185" height="40" rx="1" fill="#2a3a4a"/>
  <!-- Eagle silhouette shape (simplified) -->
  <path d="M60,275 Q80,260 100,268 Q120,260 140,275 Q120,280 100,278 Q80,280 60,275Z" fill="#4a6a8a" opacity="0.6"/>
  <text x="123" y="271" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c8a84a" font-weight="bold">LEADERSHIP</text>
  <text x="123" y="283" text-anchor="middle" font-family="serif" font-size="5.5" fill="#8898aa" font-style="italic">it's not about the team, really</text>
  <rect x="32" y="295" width="183" height="2" fill="#3a5a7a"/>
  <text x="123" y="302" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#6a8090">ACHIEVERS COLLECTION</text>

  <!-- Executive desk — dark mahogany, occupies left/centre bottom -->
  <rect x="0" y="290" width="245" height="80" rx="3" fill="#5a3a22"/>
  <rect x="0" y="290" width="245" height="8" rx="3" fill="#7a5032"/>
  <!-- Desk surface gleam -->
  <rect x="5" y="292" width="230" height="2" rx="1" fill="#9a7050" opacity="0.4"/>
  <!-- Desk legs -->
  <rect x="10" y="355" width="18" height="28" fill="#4a2a12"/>
  <rect x="217" y="355" width="18" height="28" fill="#4a2a12"/>

  <!-- Desktop items -->
  <!-- Monitor -->
  <rect x="12" y="238" width="110" height="58" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <rect x="15" y="241" width="104" height="52" rx="2" fill="#1a2a4a"/>
  <text x="67" y="262" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaaaff">OUTLOOK</text>
  <text x="67" y="274" text-anchor="middle" font-family="monospace" font-size="6" fill="#ff8844">332 unread</text>
  <text x="67" y="284" text-anchor="middle" font-family="monospace" font-size="5" fill="#6688aa">(all from IT)</text>
  <!-- Monitor stand -->
  <rect x="60" y="296" width="14" height="4" fill="#333"/>
  <rect x="52" y="299" width="30" height="3" rx="1" fill="#2a2a2a"/>

  <!-- Nameplate -->
  <rect x="30" y="296" width="90" height="16" rx="2" fill="#c8a840" stroke="#a88828" stroke-width="1"/>
  <text x="75" y="307" text-anchor="middle" font-family="serif" font-size="7" fill="#2a1a08" font-weight="bold">D. MANGEMENT</text>
  <!-- Stapler/phone on desk -->
  <rect x="145" y="296" width="38" height="12" rx="2" fill="#444"/>
  <rect x="148" y="293" width="28" height="5" rx="1" fill="#555"/>
  <!-- Coffee mug: WORLD'S OKAYEST BOSS -->
  <rect x="198" y="285" width="28" height="30" rx="3" fill="#e8e0d0" stroke="#c8b8a0" stroke-width="1"/>
  <rect x="201" y="288" width="22" height="24" rx="2" fill="#d8c8b0"/>
  <text x="212" y="299" text-anchor="middle" font-family="monospace" font-size="4" fill="#666">WORLD'S</text>
  <text x="212" y="306" text-anchor="middle" font-family="monospace" font-size="3.5" fill="#666">OKAYEST</text>
  <text x="212" y="312" text-anchor="middle" font-family="monospace" font-size="4" fill="#666">BOSS</text>
  <!-- Mug handle -->
  <path d="M226,293 Q234,293 234,300 Q234,307 226,307" fill="none" stroke="#c8b8a0" stroke-width="2"/>
</svg>
