  <text x="270" y="164" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">7. Application</text>
  <rect x="223" y="169" width="94" height="12" rx="1" fill="#4488cc"/>
  <text x="270" y="178" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">6. Presentation</text>
  <rect x="223" y="183" width="94" height="12" rx="1" fill="#44aacc"/>
  <text x="270" y="192" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">5. Session</text>
  <rect x="223" y="197" width="94" height="12" rx="1" fill="#44cc88"/>
  <text x="270" y="206" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">4. Transport</text>
  <rect x="223" y="211" width="94" height="12" rx="1" fill="#88cc44"/>
  <text x="270" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">3. Network</text>
  <rect x="223" y="225" width="94" height="12" rx="1" fill="#ccaa44"/>
  <text x="270" y="234" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">2. Data Link</text>
  <rect x="223" y="239" width="94" height="12" rx="1" fill="#cc4444"/>
  <text x="270" y="248" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">1. Physical (chaos)</text>
  <rect x="267" y="128" width="6" height="6" rx="1" fill="#666"/>

  <!-- POSTER: Have you tried turning it off and on? -->
  <rect x="360" y="140" width="100" height="80" rx="2" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="2"/>
  <text x="410" y="162" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc4444" font-weight="bold">HAVE YOU</text>
  <text x="410" y="176" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc4444" font-weight="bold">TRIED</text>
  <text x="410" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffaa00" font-weight="bold">TURNING IT</text>
  <text x="410" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffaa00" font-weight="bold">OFF &amp; ON?</text>
  <rect x="407" y="138" width="6" height="6" rx="1" fill="#666"/>
