  <rect x="184" y="26" width="132" height="4" rx="1" fill="#ffee88" opacity="0.3"/>
  <rect x="380" y="24" width="140" height="8" rx="2" fill="#2a2020" stroke="#3a2a2a" stroke-width="1"/>
  <rect x="384" y="26" width="132" height="4" rx="1" fill="#ffee88" opacity="0.6"/>

