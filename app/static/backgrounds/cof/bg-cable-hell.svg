  <path d="M114,200 Q200,180 300,200 Q400,218 490,196 Q535,182 566,200" fill="none" stroke="#ccaa22" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M112,280 Q200,264 310,280 Q400,294 480,274 Q526,260 568,276" fill="none" stroke="#aa22cc" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M115,340 Q190,316 270,342 Q350,366 430,338 Q495,316 567,340" fill="none" stroke="#cc2222" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

