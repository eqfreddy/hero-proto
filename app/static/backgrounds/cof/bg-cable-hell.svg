  <path d="M110,54 Q155,72 210,50 Q275,28 330,58 Q385,84 445,52 Q505,24 572,54" fill="none" stroke="#cc2222" stroke-width="4" stroke-linecap="round"/>
  <path d="M110,68 Q185,52 250,72 Q305,88 360,64 Q415,42 475,68 Q520,88 572,68" fill="none" stroke="#22cc44" stroke-width="4" stroke-linecap="round"/>
  <path d="M110,84 Q165,104 225,80 Q295,54 355,82 Q408,106 470,80 Q520,58 572,84" fill="none" stroke="#ccaa22" stroke-width="4" stroke-linecap="round"/>

