  <rect x="200" y="290" width="110" height="18" rx="2" fill="#2a1a00" stroke="#4a3000" stroke-width="1" transform="rotate(-3,255,299)"/>
  <text x="255" y="302" text-anchor="middle" font-family="monospace" font-size="7" fill="#cc8800" transform="rotate(-3,255,299)">to printer 3 (maybe)</text>
  <rect x="340" y="250" width="120" height="18" rx="2" fill="#001a2a" stroke="#002a44" stroke-width="1" transform="rotate(4,400,259)"/>
  <text x="400" y="262" text-anchor="middle" font-family="monospace" font-size="7" fill="#4488cc" transform="rotate(4,400,259)">DO NOT UNPLUG (why)</text>
