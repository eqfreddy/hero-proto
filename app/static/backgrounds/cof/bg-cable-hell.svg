  <rect x="22" y="36" width="82" height="9" rx="1" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="22" y="49" width="82" height="9" rx="1" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="22" y="62" width="82" height="18" rx="1" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <rect x="22" y="84" width="82" height="9" rx="1" fill="#1a0a0a" stroke="#4a1a1a" stroke-width="1"/>
  <circle cx="30" cy="41" r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="30" cy="54" r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="30" cy="67" r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="30" cy="89" r="2.5" fill="#ff4444" opacity="0.9"/>
  <rect x="576" y="36" width="82" height="9" rx="1" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="576" y="49" width="82" height="18" rx="1" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <rect x="576" y="71" width="82" height="9" rx="1" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="576" y="84" width="82" height="9" rx="1" fill="#1a0a0a" stroke="#4a1a1a" stroke-width="1"/>
  <circle cx="584" cy="41" r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="584" cy="54" r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="584" cy="89" r="2.5" fill="#ff4444" opacity="0.9"/>

