  <text x="245" y="362" text-anchor="middle" font-family="monospace" font-size="7" fill="#cc4400" transform="rotate(2,245,359)">IDF-B to MDF (maybe)</text>

  <!-- POSTER: OSI model where layer 1 = chaos -->
  <rect x="220" y="130" width="100" height="130" rx="2" fill="#f0f0e8" stroke="#c8c8b8" stroke-width="2"/>
  <rect x="223" y="133" width="94" height="20" rx="1" fill="#2244aa"/>
