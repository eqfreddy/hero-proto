  <path d="M572,40 Q560,88 570,148 Q580,206 566,264 Q554,318 568,374" fill="none" stroke="#2244cc" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M572,68 Q562,116 574,172 Q584,224 568,280 Q554,332 570,380" fill="none" stroke="#22cc44" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

