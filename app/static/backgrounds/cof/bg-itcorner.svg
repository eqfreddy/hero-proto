  <rect x="578" y="30" width="84" height="353" rx="2" fill="#1e2028" stroke="#2a2c34" stroke-width="1.5"/>
  <rect x="582" y="34"  width="76" height="9"  rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="582" y="46"  width="76" height="18" rx="1" fill="#0d200d" stroke="#1a4a1a" stroke-width="1"/>
  <rect x="582" y="67"  width="76" height="9"  rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="582" y="79"  width="76" height="9"  rx="1" fill="#200a0a" stroke="#4a1010" stroke-width="1"/>
  <circle cx="590" cy="39"  r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="590" cy="52"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="590" cy="72"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="590" cy="84"  r="2.5" fill="#ff4444" opacity="0.9"/>
  <circle cx="600" cy="39"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="600" cy="52"  r="2.5" fill="#ffaa00" opacity="0.9"/>

  <!-- WHITEBOARD — center wall, network diagram nobody understands -->
  <rect x="210" y="110" width="200" height="130" rx="3" fill="#f0efec" stroke="#c8c4bc" stroke-width="2"/>
  <rect x="213" y="113" width="194" height="124" rx="2" fill="#f8f8f4"/>
  <!-- Whiteboard diagram: boxes and arrows -->
  <rect x="222" y="120" width="36" height="18" rx="2" fill="none" stroke="#2244cc" stroke-width="1.5"/>
  <text x="240" y="132" text-anchor="middle" font-family="monospace" font-size="6" fill="#2244cc">ROUTER</text>
  <rect x="292" y="120" width="36" height="18" rx="2" fill="none" stroke="#22aa22" stroke-width="1.5"/>
  <text x="310" y="132" text-anchor="middle" font-family="monospace" font-size="6" fill="#22aa22">SWITCH</text>
  <rect x="362" y="120" width="36" height="18" rx="2" fill="none" stroke="#cc4444" stroke-width="1.5"/>
  <text x="380" y="132" text-anchor="middle" font-family="monospace" font-size="6" fill="#cc4444">???</text>
  <!-- Arrows -->
  <line x1="258" y1="129" x2="292" y2="129" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="328" y1="129" x2="362" y2="129" stroke="#555" stroke-width="1.5"/>
  <!-- Mystery circle in middle -->
  <circle cx="310" cy="175" r="22" fill="none" stroke="#aa4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="171" text-anchor="middle" font-family="monospace" font-size="6" fill="#aa4444">THE</text>
  <text x="310" y="181" text-anchor="middle" font-family="monospace" font-size="6" fill="#aa4444">CLOUD?</text>
  <text x="310" y="192" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">(nobody knows)</text>
  <!-- Erased but still visible scrawl -->
  <text x="240" y="225" text-anchor="middle" font-family="monospace" font-size="6" fill="#bbb">DNS → ???? → profit</text>
  <text x="380" y="155" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#cc8844" transform="rotate(-15,380,155)">DON'T TOUCH</text>
  <!-- Whiteboard marker tray -->
  <rect x="210" y="240" width="200" height="6" rx="1" fill="#c0bcb4" stroke="#a8a49c" stroke-width="1"/>
  <rect x="213" y="241" width="12" height="4" rx="1" fill="#cc2222"/>
  <rect x="228" y="241" width="12" height="4" rx="1" fill="#2244cc"/>
  <rect x="243" y="241" width="12" height="4" rx="1" fill="#1a1a1a"/>
  <!-- Whiteboard pin -->
  <rect x="307" y="107" width="6" height="5" rx="1" fill="#888"/>

  <!-- Post-it cluster on wall right of whiteboard -->
  <rect x="420" y="118" width="44" height="26" rx="1" fill="#ffee44" stroke="#e8d800" stroke-width="1" transform="rotate(3,442,131)"/>
  <text x="442" y="129" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#554400" transform="rotate(3,442,131)">REBOOT ONLY</text>
  <text x="442" y="138" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#554400" transform="rotate(3,442,131)">AFTER 5PM</text>
  <rect x="418" y="152" width="44" height="20" rx="1" fill="#ff8888" stroke="#ee6666" stroke-width="1" transform="rotate(-2,440,162)"/>
  <text x="440" y="160" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#660000" transform="rotate(-2,440,162)">CALL VENDOR</text>
  <text x="440" y="169" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#660000" transform="rotate(-2,440,162)">(don't hold breath)</text>
  <rect x="422" y="178" width="38" height="20" rx="1" fill="#88ff88" stroke="#44ee44" stroke-width="1" transform="rotate(1,441,188)"/>
  <text x="441" y="188" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#004400" transform="rotate(1,441,188)">uptime: 847 days</text>
  <text x="441" y="197" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#004400" transform="rotate(1,441,188)">(do not touch)</text>

  <!-- Power strip on floor — overloaded -->
  <rect x="220" y="370" width="200" height="10" rx="3" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="240" cy="375" r="3.5" fill="#222"/>
  <circle cx="256" cy="375" r="3.5" fill="#222"/>
  <circle cx="272" cy="375" r="3.5" fill="#222"/>
  <circle cx="288" cy="375" r="3.5" fill="#222"/>
  <circle cx="304" cy="375" r="3.5" fill="#222"/>
  <circle cx="320" cy="375" r="3.5" fill="#222"/>
  <circle cx="336" cy="375" r="3.5" fill="#222"/>
  <circle cx="352" cy="375" r="3.5" fill="#222"/>
  <circle cx="368" cy="375" r="3.5" fill="#222"/>
  <circle cx="384" cy="375" r="3.5" fill="#222"/>
  <circle cx="400" cy="375" r="3.5" fill="#222"/>
  <!-- Overload indicator -->
  <circle cx="414" cy="375" r="4" fill="#ff2222" opacity="0.9"/>
  <!-- Cables from power strip -->
  <path d="M260,370 Q250,352 238,310" fill="none" stroke="#555" stroke-width="2" opacity="0.6"/>
  <path d="M300,370 Q310,347 320,300" fill="none" stroke="#555" stroke-width="2" opacity="0.6"/>
  <path d="M350,370 Q345,344 355,295" fill="none" stroke="#555" stroke-width="2" opacity="0.6"/>

  <!-- Floor cable runs -->
  <path d="M102,350 Q180,340 220,360 Q260,378 300,355" fill="none" stroke="#2244cc" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M104,365 Q185,358 225,372 Q265,386 305,368" fill="none" stroke="#cc2222" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M578,348 Q520,338 490,355 Q455,372 430,350" fill="none" stroke="#22cc44" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
