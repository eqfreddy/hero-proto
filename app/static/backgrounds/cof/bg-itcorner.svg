  <path d="M102,60  Q140,55 175,65 Q210,73 240,60" fill="none" stroke="#2244cc" stroke-width="4" stroke-linecap="round"/>
  <path d="M102,70  Q145,78 180,68 Q218,58 245,72" fill="none" stroke="#cc2222" stroke-width="4" stroke-linecap="round"/>
  <path d="M102,80  Q138,88 172,78 Q208,68 242,82" fill="none" stroke="#22cc44" stroke-width="4" stroke-linecap="round"/>
  <path d="M102,90  Q142,82 178,92 Q215,102 244,88" fill="none" stroke="#ccaa22" stroke-width="4" stroke-linecap="round"/>
  <path d="M102,100 Q136,110 174,100 Q210,90 243,104" fill="none" stroke="#aa22cc" stroke-width="4" stroke-linecap="round"/>

