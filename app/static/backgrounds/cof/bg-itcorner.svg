<svg xmlns="http://www.w3.org/2000/svg" width="680" height="383" viewBox="0 0 680 383">
  <!-- CLUSTER OF FUCKERY — Background: IT Corner -->
  <!-- The sacred closet. Smells like burned capacitors and regret. -->

  <!-- Dark walls — navy/charcoal -->
  <rect width="680" height="383" fill="#1a1c24"/>
  <rect x="0" y="0"   width="680" height="26" fill="#141620"/>
  <rect x="0" y="24"  width="680" height="3"  fill="#0e1018"/>
  <rect x="0" y="370" width="680" height="13" fill="#121418"/>

  <!-- Single overhead fluorescent — flickering, one end dimmer -->
  <rect x="220" y="4" width="240" height="10" rx="2" fill="#2a2c34" stroke="#1e2028" stroke-width="1"/>
  <rect x="224" y="6" width="108" height="6"  rx="1" fill="#fffff4" opacity="0.85"/>
  <rect x="336" y="6" width="120" height="6"  rx="1" fill="#fffff4" opacity="0.40"/>
  <ellipse cx="340" cy="26" rx="160" ry="22" fill="#fffff0" opacity="0.07"/>

  <!-- DO NOT REBOOT sign top center -->
  <rect x="260" y="5" width="160" height="16" rx="2" fill="#6a0000" stroke="#aa1010" stroke-width="1"/>
  <text x="340" y="16" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#ffaaaa" font-weight="bold">⚠ DO NOT REBOOT ⚠</text>

  <!-- Light switch — left wall -->
  <rect x="14" y="66" width="16" height="26" rx="3" fill="#2a2c34" stroke="#1a1c24" stroke-width="1.5"/>
  <rect x="18" y="70" width="8"  height="6"  rx="1" fill="#3a3c44"/>
  <rect x="20" y="71" width="4"  height="4"  rx="0.5" fill="#44aa44" opacity="0.9"/>

  <!-- LEFT WALL — full-height network rack -->
  <rect x="18" y="30" width="84" height="353" rx="2" fill="#1e2028" stroke="#2a2c34" stroke-width="1.5"/>
  <!-- Rack units — switches, patch panels, routers -->
  <rect x="22" y="34"  width="76" height="9"  rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="22" y="46"  width="76" height="9"  rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="22" y="58"  width="76" height="18" rx="1" fill="#0d200d" stroke="#1a4a1a" stroke-width="1"/>
  <rect x="22" y="79"  width="76" height="9"  rx="1" fill="#200a0a" stroke="#4a1010" stroke-width="1"/>
  <rect x="22" y="91"  width="76" height="9"  rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="22" y="103" width="76" height="18" rx="1" fill="#0a1a38" stroke="#1a3a6c" stroke-width="1"/>
  <rect x="22" y="124" width="76" height="9"  rx="1" fill="#0d200d" stroke="#1a4a1a" stroke-width="1"/>
  <!-- Status LEDs left rack -->
  <circle cx="30" cy="39"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="30" cy="51"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="30" cy="64"  r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="30" cy="84"  r="2.5" fill="#ff4444" opacity="0.9"/>
  <circle cx="30" cy="96"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="30" cy="109" r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="40" cy="39"  r="2.5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="40" cy="51"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="40" cy="64"  r="2.5" fill="#00ff44" opacity="0.9"/>
  <circle cx="40" cy="84"  r="2.5" fill="#ff4444" opacity="0.9"/>
  <!-- Patch panel port rows -->
  <rect x="50" y="35"  width="44" height="7" rx="1" fill="#111"/>
  <rect x="50" y="47"  width="44" height="7" rx="1" fill="#111"/>
  <!-- patch ports -->
  <rect x="52" y="36"  width="5" height="5" rx="1" fill="#333"/>
  <rect x="59" y="36"  width="5" height="5" rx="1" fill="#333"/>
  <rect x="66" y="36"  width="5" height="5" rx="1" fill="#333"/>
  <rect x="73" y="36"  width="5" height="5" rx="1" fill="#333"/>
  <rect x="80" y="36"  width="5" height="5" rx="1" fill="#333"/>
  <rect x="87" y="36"  width="5" height="5" rx="1" fill="#333"/>

