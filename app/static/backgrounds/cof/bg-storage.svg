<svg xmlns="http://www.w3.org/2000/svg" width="680" height="383" viewBox="0 0 680 383">
  <!-- CLUSTER OF FUCKERY — Background: Storage Room -->
  <!-- The office graveyard. Equipment goes in. Equipment does not come out. -->

  <!-- Dingy beige/cream walls -->
  <rect width="680" height="383" fill="#d8d2c4"/>
  <rect x="0" y="0"   width="680" height="26" fill="#ccc6b8"/>
  <rect x="0" y="24"  width="680" height="3"  fill="#beb8aa"/>
  <rect x="0" y="370" width="680" height="13" fill="#c4beb0"/>
  <rect x="0" y="368" width="680" height="3"  fill="#b4aea0"/>

  <!-- Single bare fluorescent — one end dead -->
  <rect x="240" y="4" width="200" height="10" rx="2" fill="#c4c0b6" stroke="#b4b0a6" stroke-width="1"/>
  <rect x="244" y="6" width="90"  height="6"  rx="1" fill="#fffff4" opacity="0.8"/>
  <rect x="338" y="6" width="98"  height="6"  rx="1" fill="#fffff4" opacity="0.15"/>
  <ellipse cx="289" cy="24" rx="120" ry="18" fill="#fffff0" opacity="0.08"/>

  <!-- "STORAGE — DO NOT DISPOSE" sign -->
  <rect x="240" y="5" width="200" height="16" rx="3" fill="#c8c0a8" stroke="#a8a090" stroke-width="1"/>
  <text x="340" y="16" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#6a6050">STORAGE — DO NOT DISPOSE (or else)</text>

  <!-- Light switch left -->
  <rect x="14" y="66" width="16" height="26" rx="3" fill="#ccc8bc" stroke="#b0aca0" stroke-width="1.5"/>
  <rect x="18" y="70" width="8"  height="6"  rx="1" fill="#dedad0"/>
  <rect x="20" y="71" width="4"  height="4"  rx="0.5" fill="#44aa44" opacity="0.8"/>
  <!-- Light switch right -->
  <rect x="650" y="66" width="16" height="26" rx="3" fill="#ccc8bc" stroke="#b0aca0" stroke-width="1.5"/>
  <rect x="654" y="70" width="8"  height="6"  rx="1" fill="#dedad0"/>
  <rect x="656" y="71" width="4"  height="4"  rx="0.5" fill="#888" opacity="0.5"/>

  <!-- LEFT SHELVING UNIT — metal industrial shelves -->
  <rect x="18" y="30" width="10" height="353" rx="1" fill="#b0aca0" stroke="#989490" stroke-width="1"/>
  <rect x="168" y="30" width="10" height="353" rx="1" fill="#b0aca0" stroke="#989490" stroke-width="1"/>
  <!-- Shelf boards left unit -->
  <rect x="18" y="80"  width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="18" y="165" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="18" y="250" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="18" y="335" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>

  <!-- Shelf 1 left — boxes -->
  <rect x="22" y="44"  width="54" height="36" rx="1" fill="#c8c0a8" stroke="#b0a890" stroke-width="1"/>
  <text x="49" y="59"  text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">HP LASERJET</text>
  <text x="49" y="69"  text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">TONER (2009)</text>
  <rect x="82" y="50"  width="44" height="30" rx="1" fill="#d0c8b0" stroke="#b0a890" stroke-width="1"/>
  <text x="104" y="63" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">MISC CABLES</text>
  <text x="104" y="72" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">DO NOT RECYCLE</text>
  <rect x="130" y="46" width="44" height="34" rx="1" fill="#c4bcaa" stroke="#b0a890" stroke-width="1"/>
  <text x="152" y="60" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">WINDOWS XP</text>
  <text x="152" y="70" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">INSTALL DISC</text>
  <text x="152" y="78" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">(5 copies)</text>

  <!-- Shelf 2 left — old hardware -->
  <!-- CRT monitor lying on its back -->
  <rect x="22" y="90"  width="80" height="72" rx="3" fill="#444440" stroke="#333330" stroke-width="2"/>
  <rect x="26" y="94"  width="72" height="58" rx="2" fill="#1a1a18"/>
  <text x="62" y="122" text-anchor="middle" font-family="monospace" font-size="6" fill="#333">COMPAQ</text>
  <text x="62" y="134" text-anchor="middle" font-family="monospace" font-size="5" fill="#2a2a2a">circa 2001</text>
  <!-- keyboard on top of CRT -->
  <rect x="26"  y="88"  width="72" height="10" rx="1" fill="#8a8878" stroke="#6a6858" stroke-width="1"/>
  <rect x="30"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="37"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="44"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="51"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="58"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="65"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="72"  y="89"  width="5"  height="7"  rx="0.5" fill="#6a6858"/>
  <rect x="82" y="90"  width="54" height="74" rx="2" fill="#c8c0a8" stroke="#b0a890" stroke-width="1"/>
  <text x="109" y="118" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">KEVIN'S</text>
  <text x="109" y="128" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">DO NOT EAT</text>
  <text x="109" y="140" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">(assorted)</text>
  <text x="109" y="155" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">Kevin left 2021</text>

  <!-- Shelf 3 left — broken chairs stacked -->
  <rect x="22" y="174" width="148" height="72" rx="1" fill="none"/>
  <!-- Chair 1 -->
  <rect x="26" y="200" width="52" height="44" rx="2" fill="#4a5060" stroke="#3a4050" stroke-width="1.5"/>
  <rect x="30" y="176" width="44" height="26" rx="2" fill="#5a6070" stroke="#3a4050" stroke-width="1.5"/>
  <line x1="30" y1="240" x2="24" y2="245" stroke="#3a4050" stroke-width="2.5"/>
  <line x1="72" y1="240" x2="78" y2="245" stroke="#3a4050" stroke-width="2.5"/>
  <!-- Chair 2 stacked on top -->
  <rect x="82" y="198" width="52" height="44" rx="2" fill="#4a5060" stroke="#3a4050" stroke-width="1.5"/>
  <rect x="86" y="174" width="44" height="26" rx="2" fill="#5a6070" stroke="#3a4050" stroke-width="1.5"/>
  <!-- "BROKEN" sticker -->
  <rect x="88" y="182" width="30" height="11" rx="1" fill="#ff4444" stroke="#cc2222" stroke-width="1"/>
  <text x="103" y="190" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="bold">BROKEN</text>

  <!-- Shelf 4 left — random surplus -->
  <rect x="22"  y="258" width="62" height="72" rx="1" fill="#c0b8a0" stroke="#a8a090" stroke-width="1"/>
  <text x="53"  y="284" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">SPARE PARTS</text>
  <text x="53"  y="294" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">Q3 2018</text>
  <text x="53"  y="304" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">(don't ask)</text>
  <rect x="90"  y="262" width="72" height="68" rx="1" fill="#c8c0a8" stroke="#a8a090" stroke-width="1"/>
  <text x="126" y="292" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">PROJECTOR</text>
  <text x="126" y="302" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">(no remote)</text>
  <text x="126" y="314" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">bulb blown</text>

  <!-- RIGHT SHELVING UNIT -->
  <rect x="502" y="30" width="10" height="353" rx="1" fill="#b0aca0" stroke="#989490" stroke-width="1"/>
  <rect x="652" y="30" width="10" height="353" rx="1" fill="#b0aca0" stroke="#989490" stroke-width="1"/>
  <!-- Shelf boards right unit -->
  <rect x="502" y="80"  width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="502" y="165" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="502" y="250" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>
  <rect x="502" y="335" width="160" height="8" rx="1" fill="#a8a498" stroke="#989088" stroke-width="1"/>

  <!-- Right shelf contents -->
  <rect x="506" y="44"  width="64" height="36" rx="1" fill="#c8c0a8" stroke="#b0a890" stroke-width="1"/>
  <text x="538" y="58"  text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">TONER (WRONG</text>
  <text x="538" y="68"  text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">PRINTER)</text>
  <rect x="576" y="46"  width="72" height="34" rx="1" fill="#d0c8b0" stroke="#b0a890" stroke-width="1"/>
  <text x="612" y="59"  text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">ETHERNET</text>
  <text x="612" y="69"  text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a6050">CAT3 (LOTS)</text>
  <text x="612" y="78"  text-anchor="middle" font-family="monospace" font-size="5" fill="#888">no, we can't use it</text>

  <rect x="506" y="90"  width="148" height="72" rx="1" fill="#b8b0a0" stroke="#a09890" stroke-width="1"/>
  <text x="580" y="122" text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">OLD LAPTOPS</text>
  <text x="580" y="134" text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">(won't boot)</text>
  <text x="580" y="148" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">do not take home</text>

  <rect x="506" y="174" width="148" height="72" rx="1" fill="#c4bcaa" stroke="#a8a090" stroke-width="1"/>
  <text x="580" y="200" text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">CONFERENCE ROOM</text>
  <text x="580" y="212" text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6050">CABLE BOX (2016)</text>
  <text x="580" y="224" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">nobody knows what it does</text>
  <text x="580" y="236" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">too scared to unplug it</text>

  <!-- Motivational poster center — sun-faded -->
  <rect x="230" y="140" width="220" height="130" rx="2" fill="#dedad0" stroke="#c0bcb2" stroke-width="1.5"/>
  <rect x="233" y="143" width="214" height="78"  rx="1" fill="#b8d0c8" opacity="0.7"/>
  <!-- Faded image: mountains -->
  <polygon points="340,208 280,218 400,218" fill="#7a9a92" opacity="0.7"/>
  <polygon points="340,192 310,218 370,218" fill="#9ab8b0" opacity="0.8"/>
  <circle cx="390" cy="156" r="16" fill="#e8cc88" opacity="0.6"/>
  <text x="340" y="236" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#7a7060" font-weight="bold">TEAMWORK</text>
  <text x="340" y="250" text-anchor="middle" font-family="monospace" font-size="6" fill="#9a9080">Makes the dream work.</text>
  <text x="340" y="261" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#aaa098">(no it doesn't)</text>
  <rect x="337" y="137" width="6" height="5" rx="1" fill="#a8a098"/>

  <!-- Dusty floor, misc stuff -->
  <rect x="178" y="368" width="320" height="8" rx="2" fill="#c0baa8" stroke="#a8a290" stroke-width="1"/>
  <!-- Old mouse on floor -->
  <ellipse cx="200" cy="376" rx="12" ry="7" fill="#888880" stroke="#666660" stroke-width="1"/>
  <path d="M196,371 Q200,366 204,371" fill="none" stroke="#555550" stroke-width="1"/>
  <path d="M194,378 Q188,383 182,390" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- "DO NOT USE" tag on old equipment -->
  <rect x="175" y="344" width="54" height="12" rx="2" fill="#ffaaaa" stroke="#ee8888" stroke-width="1" transform="rotate(-2,202,350)"/>
  <text x="202" y="352" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#660000" transform="rotate(-2,202,350)">DO NOT USE</text>
  <rect x="448" y="344" width="54" height="12" rx="2" fill="#ffaaaa" stroke="#ee8888" stroke-width="1" transform="rotate(3,475,350)"/>
  <text x="475" y="352" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#660000" transform="rotate(3,475,350)">STILL BROKEN</text>
</svg>
