<svg xmlns="http://www.w3.org/2000/svg" width="680" height="383" viewBox="0 0 680 383">
  <!-- CLUSTER OF FUCKERY — Background: Open Office -->
  <!-- Hot desking. Nobody knows whose cables are whose. -->

  <!-- WALL + CEILING + FLOOR -->
  <rect width="680" height="383" fill="#e0dbd0"/>
  <rect x="0" y="0" width="680" height="28" fill="#d4cfc5"/>
  <rect x="0" y="26" width="680" height="3" fill="#c4bfb5"/>
  <rect x="0" y="370" width="680" height="13" fill="#c8c4b8"/>
  <rect x="0" y="368" width="680" height="3" fill="#b8b4a8"/>

  <!-- FLUORESCENT LIGHTS — four fixtures, one flickering -->
  <rect x="50"  y="4" width="110" height="10" rx="2" fill="#ccc9c0" stroke="#b8b5ac" stroke-width="1"/>
  <rect x="54"  y="6" width="102" height="6"  rx="1" fill="#fffff4" opacity="0.9"/>
  <rect x="215" y="4" width="110" height="10" rx="2" fill="#ccc9c0" stroke="#b8b5ac" stroke-width="1"/>
  <rect x="219" y="6" width="102" height="6"  rx="1" fill="#fffff4" opacity="0.9"/>
  <!-- third tube — flickering, dimmer -->
  <rect x="390" y="4" width="110" height="10" rx="2" fill="#ccc9c0" stroke="#b8b5ac" stroke-width="1"/>
  <rect x="394" y="6" width="102" height="6"  rx="1" fill="#fffff4" opacity="0.4"/>
  <rect x="560" y="4" width="95"  height="10" rx="2" fill="#ccc9c0" stroke="#b8b5ac" stroke-width="1"/>
  <rect x="564" y="6" width="87"  height="6"  rx="1" fill="#fffff4" opacity="0.85"/>
  <!-- ceiling glow halos -->
  <ellipse cx="105" cy="24" rx="80" ry="18" fill="#fffff0" opacity="0.10"/>
  <ellipse cx="270" cy="24" rx="80" ry="18" fill="#fffff0" opacity="0.10"/>
  <ellipse cx="445" cy="24" rx="80" ry="18" fill="#fffff0" opacity="0.05"/>

  <!-- HOT DESKING ZONE sign -->
  <rect x="240" y="5" width="200" height="17" rx="3" fill="#ccc8be" stroke="#b0ada4" stroke-width="1"/>
  <text x="340" y="16" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#6a6558">HOT DESKING ZONE — take any available seat</text>

  <!-- LIGHT SWITCHES — two per side wall -->
  <rect x="14" y="60" width="16" height="26" rx="3" fill="#d6d2c8" stroke="#b8b5ac" stroke-width="1.5"/>
  <rect x="18" y="64" width="8"  height="6"  rx="1" fill="#e8e4dc"/>
  <rect x="20" y="65" width="4"  height="4"  rx="0.5" fill="#44aa44" opacity="0.8"/>
  <rect x="14" y="92" width="16" height="26" rx="3" fill="#d6d2c8" stroke="#b8b5ac" stroke-width="1.5"/>
  <rect x="18" y="96" width="8"  height="6"  rx="1" fill="#e8e4dc"/>
  <rect x="20" y="97" width="4"  height="4"  rx="0.5" fill="#777" opacity="0.5"/>
  <rect x="650" y="60" width="16" height="26" rx="3" fill="#d6d2c8" stroke="#b8b5ac" stroke-width="1.5"/>
  <rect x="654" y="64" width="8"  height="6"  rx="1" fill="#e8e4dc"/>
  <rect x="656" y="65" width="4"  height="4"  rx="0.5" fill="#44aa44" opacity="0.8"/>
  <rect x="650" y="92" width="16" height="26" rx="3" fill="#d6d2c8" stroke="#b8b5ac" stroke-width="1.5"/>
  <rect x="654" y="96" width="8"  height="6"  rx="1" fill="#e8e4dc"/>
  <rect x="656" y="97" width="4"  height="4"  rx="0.5" fill="#44aa44" opacity="0.8"/>

  <!-- MOTIVATIONAL POSTER (left wall) -->
  <rect x="28" y="135" width="90" height="112" rx="2" fill="#f4f0e8" stroke="#d0ccc4" stroke-width="1.5"/>
  <rect x="31" y="138" width="84" height="52"  rx="1" fill="#1e3a54"/>
  <polygon points="73,178 46,190 100,190" fill="#2e6aaa" opacity="0.8"/>
  <polygon points="73,165 58,190 88,190"  fill="#4a8acc" opacity="0.9"/>
  <circle cx="95" cy="148" r="7" fill="#ffcc44" opacity="0.75"/>
  <text x="73" y="205" text-anchor="middle" font-family="sans-serif" font-size="7"   fill="#3a6a8a" font-weight="bold">HANG IN THERE</text>
  <text x="73" y="217" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#8a9aaa">IT cannot help</text>
  <text x="73" y="228" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#8a9aaa">you with that.</text>
  <rect x="70" y="131" width="6" height="5" rx="1" fill="#aaa"/>

  <!-- STANDING DESK (broken, stuck at wrong height, far right background) -->
  <!-- Surface — noticeably higher than the regular desks -->
  <rect x="542" y="182" width="122" height="12" rx="3" fill="#d0cbc0" stroke="#b4b0a4" stroke-width="1.5"/>
  <!-- Left leg — shorter (mechanism failed partway) -->
  <rect x="548" y="194" width="8" height="72" rx="2" fill="#bcb8ac" stroke="#a0a098" stroke-width="1"/>
  <!-- Right leg — different height = visibly broken -->
  <rect x="648" y="194" width="8" height="58" rx="2" fill="#bcb8ac" stroke="#a0a098" stroke-width="1"/>
  <!-- "HEIGHT STUCK" sticky -->
  <rect x="553" y="185" width="54" height="20" rx="1" fill="#ff8888" stroke="#ee6666" stroke-width="1" transform="rotate(2,580,195)"/>
  <text x="580" y="194" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#660000" font-weight="700" transform="rotate(2,580,195)">HEIGHT STUCK</text>
  <text x="580" y="203" text-anchor="middle" font-family="monospace" font-size="5"   fill="#660000" transform="rotate(2,580,195)">DO NOT ADJUST</text>
  <!-- Monitor on standing desk -->
  <rect x="558" y="144" width="92" height="40" rx="2" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>
  <rect x="560" y="146" width="88" height="36" rx="1" fill="#1a1a2e"/>
  <text x="604" y="161" text-anchor="middle" font-family="monospace" font-size="6" fill="#666">nobody's desk</text>
  <text x="604" y="173" text-anchor="middle" font-family="monospace" font-size="6" fill="#555">nobody's problem</text>
  <rect x="599" y="184" width="10" height="4" rx="1" fill="#555"/>

  <!-- MAIN HOT-DESK ROW — continuous surface, no dividers -->
  <rect x="18" y="288" width="644" height="14" rx="3" fill="#d0cbc0" stroke="#b8b4a8" stroke-width="1.5"/>
  <!-- Desk legs at intervals -->
  <rect x="26"  y="302" width="10" height="70" rx="2" fill="#c4c0b4" stroke="#a8a49a" stroke-width="1"/>
  <rect x="186" y="302" width="10" height="70" rx="2" fill="#c4c0b4" stroke="#a8a49a" stroke-width="1"/>
  <rect x="346" y="302" width="10" height="70" rx="2" fill="#c4c0b4" stroke="#a8a49a" stroke-width="1"/>
  <rect x="506" y="302" width="10" height="70" rx="2" fill="#c4c0b4" stroke="#a8a49a" stroke-width="1"/>
  <rect x="644" y="302" width="10" height="70" rx="2" fill="#c4c0b4" stroke="#a8a49a" stroke-width="1"/>

  <!-- MONITOR 1 — left section, password post-it -->
  <rect x="34"  y="250" width="104" height="40" rx="2" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>
  <rect x="36"  y="252" width="100" height="36" rx="1" fill="#1a3a5c"/>
  <text x="86" y="267" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#4a9a4a">&gt; logged in as admin</text>
  <text x="86" y="280" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#4a9a4a">&gt; last login: never</text>
  <rect x="80" y="290" width="12" height="4" rx="1" fill="#555"/>
  <rect x="72" y="294" width="28" height="3" rx="1" fill="#555"/>
  <!-- Password post-it on monitor bezel -->
  <rect x="116" y="248" width="40" height="24" rx="1" fill="#ffee44" stroke="#e8d800" stroke-width="1" transform="rotate(-4,136,260)"/>
  <text x="136" y="259" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#554400" font-weight="700" transform="rotate(-4,136,260)">pw: Summer1!</text>
  <text x="136" y="268" text-anchor="middle" font-family="monospace" font-size="5"   fill="#886600" transform="rotate(-4,136,260)">shh don't tell IT</text>

  <!-- MONITOR 2 — second section, Windows Update -->
  <rect x="188" y="247" width="108" height="43" rx="2" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>
  <rect x="190" y="249" width="104" height="39" rx="1" fill="#0a2a6a"/>
  <rect x="192" y="252" width="100" height="11" rx="1" fill="#0050cc"/>
  <text x="242" y="260" text-anchor="middle" font-family="sans-serif" font-size="6.5" fill="#fff" font-weight="bold">Windows Update</text>
  <text x="242" y="272" text-anchor="middle" font-family="monospace" font-size="6" fill="#88aaff">Updating…  23%</text>
  <text x="242" y="283" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#ff8888">Do not turn off</text>
  <rect x="236" y="290" width="12" height="4" rx="1" fill="#555"/>
  <rect x="228" y="294" width="28" height="3" rx="1" fill="#555"/>

  <!-- FRONT DESK SURFACE — left side (character stands here) -->
  <rect x="18" y="352" width="200" height="10" rx="2" fill="#d0cbc0" stroke="#b8b4a8" stroke-width="1.5"/>
  <!-- Abandoned mug -->
  <rect x="40" y="342" width="16" height="12" rx="2" fill="#c8943a" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M56,346 Q63,349 56,353" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- "NOT YOUR DESK" note -->
  <rect x="62" y="344" width="50" height="12" rx="1" fill="#ffe8d0" stroke="#d8c0a0" stroke-width="1"/>
  <text x="87" y="352" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#886644">NOT YOUR DESK</text>

  <!-- CABLE SPAGHETTI on floor — the hot-desk special -->
  <path d="M30,362 Q90,354 140,364 Q190,372 230,359 Q260,350 290,362"   fill="none" stroke="#666"   stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M35,369 Q80,376 125,366 Q170,357 210,368 Q250,378 285,366"  fill="none" stroke="#4444cc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M450,362 Q500,354 545,364 Q590,372 630,360 Q655,354 670,364" fill="none" stroke="#cc4444" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M445,369 Q488,376 530,366 Q575,357 618,367 Q648,374 668,368" fill="none" stroke="#44aa44" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <!-- Mystery cable label -->
  <rect x="110" y="357" width="80" height="11" rx="2" fill="#e8e4d4" stroke="#c8c4b4" stroke-width="1" transform="rotate(-2,150,362)"/>
  <text x="150" y="365" text-anchor="middle" font-family="monospace" font-size="5" fill="#666" transform="rotate(-2,150,362)">to printer? (unsure)</text>
</svg>
