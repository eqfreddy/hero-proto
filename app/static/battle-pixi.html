<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Battle replay (Pixi + DragonBones prototype)</title>
  <style>
    :root {
      --bg: #0b0d10; --panel: #14181e; --border: #2d3847;
      --text: #ddd; --muted: #8a96a8; --accent: #4ea1ff;
      --good: #2ad06a; --bad: #ff6b4a; --legendary: #ffd86b;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font: 13px/1.5 system-ui, -apple-system, sans-serif; }
    header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: var(--panel); }
    header h1 { margin: 0; font-size: 14px; font-weight: 700; }
    header .pill { background: rgba(78, 161, 255, 0.12); color: var(--accent); padding: 3px 8px; border-radius: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    main { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #stage { background: linear-gradient(180deg, #1a2032 0%, #0e131c 100%); border: 1px solid var(--border); border-radius: 8px; position: relative; }
    .controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .controls button { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .controls button:hover { border-color: var(--accent); color: var(--accent); }
    .controls button.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
    .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    .controls label { color: var(--muted); font-size: 11px; }
    #status-line { color: var(--muted); font-size: 11px; min-height: 16px; }
    #status-line.error { color: var(--bad); }
    #event-log {
      background: #0a0d11; border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; width: 100%; max-width: 960px; box-sizing: border-box;
      font: 11px/1.5 ui-monospace, "Consolas", monospace;
      max-height: 180px; overflow-y: auto; color: #c0c8d4;
    }
    #event-log .now { background: rgba(78, 161, 255, 0.15); color: var(--accent); padding: 1px 4px; border-radius: 2px; }
    #event-log .past { opacity: 0.5; }
    .nav-back { color: var(--muted); text-decoration: none; font-size: 11px; }
    .nav-back:hover { color: var(--accent); }
  </style>
</head>
<body>
<header>
  <h1>⚔ Battle replay — Pixi + DragonBones</h1>
  <span class="pill">Plan B prototype</span>
  <span style="font-size: 11px; color: var(--muted);">Battle <strong id="bid">?</strong></span>
  <span style="margin-left: auto; display: flex; gap: 12px; align-items: center;">
    <a href="#" id="phaser-fallback" class="nav-back">← back to Phaser viewer</a>
    <a href="/app/" class="nav-back">↑ dashboard</a>
  </span>
</header>

<main>
  <div id="stage"></div>

  <div class="controls" id="controls">
    <button type="button" id="btn-play" class="primary">▶ Play</button>
    <button type="button" id="btn-pause">⏸ Pause</button>
    <button type="button" id="btn-step">⏭ Step</button>
    <button type="button" id="btn-restart">⟲ Restart</button>
    <label>Speed
      <select id="speed">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
      </select>
    </label>
  </div>

  <div id="status-line">loading…</div>

  <div id="event-log">event log will appear here</div>
</main>

<script src="/app/static/dragonbones-demo/libs/pixi.js"></script>
<script src="/app/static/dragonbones-demo/libs/dragonBones.js"></script>
<script>
// =============================================================================
// Pixi-based battle replay prototype.
//
// Reads ?id=<battle_id> from the URL, fetches /battles/{id}, places one
// DragonBones armature per participant via the registry mapping in
// /app/static/battle-rigs/registry.json, then walks the combat log with
// timed dispatch (one event per ~tickMs) playing the right animation
// per event.
//
// Phase 3.4 placeholder — every hero uses the demo Mecha rig until
// production rigs ship. The wiring is what matters; the rig is swappable
// per-unit by editing registry.json.
// =============================================================================

(function () {
  const TOKEN_KEY = "heroproto_jwt";
  const STAGE_W = 960, STAGE_H = 520;
  const REGISTRY_URL = "/app/static/battle-rigs/registry.json";

  const params = new URLSearchParams(location.search);
  const battleId = params.get("id");
  document.getElementById("bid").textContent = battleId || "?";
  document.getElementById("phaser-fallback").href = battleId
    ? `/app/battle-phaser.html?id=${battleId}` : "/app/";

  function setStatus(msg, isError) {
    const s = document.getElementById("status-line");
    s.textContent = msg;
    s.classList.toggle("error", !!isError);
  }

  async function loadBattle(id) {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) throw new Error("not signed in — log in on the dashboard first");
    const mode = params.get("mode") || "battle";
    const url = mode === "arena" ? `/arena/matches/${id}` : `/battles/${id}`;
    const r = await fetch(url, { headers: { authorization: "Bearer " + token } });
    if (!r.ok) throw new Error(`HTTP ${r.status} — ${(await r.text()).slice(0, 200)}`);
    return r.json();
  }

  async function loadRegistry() {
    const r = await fetch(REGISTRY_URL);
    if (!r.ok) throw new Error(`registry fetch ${r.status}`);
    return r.json();
  }

  // Pixi app
  const app = new PIXI.Application({
    width: STAGE_W, height: STAGE_H,
    transparent: false, backgroundColor: 0x0e1621,
    antialias: true, autoDensity: true,
    resolution: window.devicePixelRatio || 1,
  });
  document.getElementById("stage").appendChild(app.view);

  // DragonBones factory + ticker.
  const factory = dragonBones.PixiFactory.factory;
  let _tickerErrCount = 0;
  app.ticker.add(() => {
    try {
      factory.update(app.ticker.elapsedMS / 1000);
    } catch (e) {
      if (++_tickerErrCount <= 3) console.error("ticker:", e);
    }
  });

  // ---- Combat-log → animation routing -----------------------------------
  // Single source of truth for which event triggers which animation.
  // Any production rig should expose at least these animation names
  // (see docs/BATTLE_RIG_EVENT_MAPPING.md for the full spec).
  const EVENT_TO_ANIM = {
    DAMAGE: (e) => {
      if (e.via === "BASIC") return "attack_basic";
      // SPECIAL — figure out which special-up animation. The combat log
      // doesn't currently echo the special.type, so for now everything
      // SPECIAL plays attack_special.
      return "attack_special";
    },
    AOE_DAMAGE: () => "attack_special_aoe",
    HEAL: () => "attack_special_heal",
    AOE_HEAL: () => "attack_special_heal",
    BUFF: () => "attack_special_buff",
    AOE_BUFF: () => "attack_special_buff",
    BOSS_PHASE: () => "attack_special_aoe",
    REVIVE: () => "attack_special_heal",
    AOE_REVIVE: () => "attack_special_heal",
    SHIELD: () => "attack_special_buff",
    CLEANSE: () => "attack_special_buff",
    HAIL_MARY: () => "attack_special_aoe",
    DEATH: () => "death",
  };

  // Events that target a unit (target side animation):
  const TARGET_HIT_EVENTS = new Set(["DAMAGE", "REFLECT"]);

  // Layout — 3 unit slots per side. Side A on the left, side B on the right.
  function slotPosition(side, idx) {
    const rowY = STAGE_H * 0.78;
    const baseX = side === "A" ? STAGE_W * 0.18 : STAGE_W * 0.82;
    const dirX = side === "A" ? 1 : -1;
    return { x: baseX + dirX * idx * 80, y: rowY - idx * 18 };
  }

  // ---- Main load ----------------------------------------------------------

  if (!battleId) {
    setStatus("missing ?id=<battle_id> in the URL", true);
    return;
  }

  const state = {
    battle: null,
    registry: null,
    actors: new Map(),       // uid → { armature, sample, idleAnim, side }
    log: [],
    cursor: 0,
    playing: true,
    stepMs: 700,
    speedMul: 1,
    tickAcc: 0,
    rigCache: new Map(),     // rigKey → parsed flag (so we don't re-parse same skeleton)
  };

  function logLine(msg) {
    const el = document.getElementById("event-log");
    const span = document.createElement("div");
    span.textContent = msg;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  async function ensureRigParsed(rigKey, rigSpec) {
    if (state.rigCache.has(rigKey)) return;
    const [skeRes, atlasRes] = await Promise.all([
      fetch(rigSpec.skeleton), fetch(rigSpec.atlas),
    ]);
    if (!skeRes.ok) throw new Error(`rig ${rigKey} skeleton ${skeRes.status}`);
    if (!atlasRes.ok) throw new Error(`rig ${rigKey} atlas ${atlasRes.status}`);
    const ske = await skeRes.json();
    const atlas = await atlasRes.json();
    const texture = await new Promise((resolve, reject) => {
      const loader = new PIXI.loaders.Loader();
      loader.add("rig_" + rigKey + "_" + Date.now(), rigSpec.texture);
      loader.load((_, resources) => {
        const keys = Object.keys(resources);
        const r = resources[keys[keys.length - 1]];
        if (r && r.texture) resolve(r.texture);
        else reject(new Error("texture failed"));
      });
      loader.onError.add((err) => reject(err));
    });
    factory.parseDragonBonesData(ske);
    factory.parseTextureAtlasData(atlas, texture);
    state.rigCache.set(rigKey, true);
  }

  function buildActor(uid, side, idx, rigSpec) {
    const armature = factory.buildArmatureDisplay(rigSpec.armature);
    if (!armature) throw new Error(`armature ${rigSpec.armature} missing`);
    const pos = slotPosition(side, idx);
    armature.x = pos.x;
    armature.y = pos.y;
    const scale = (rigSpec.scale_default || 0.5);
    armature.scale.x = (side === "A" ? 1 : -1) * scale;
    armature.scale.y = scale;
    app.stage.addChild(armature);
    armature.animation.play(rigSpec.animations.idle || "idle", 0);
    return armature;
  }

  async function init() {
    setStatus("loading battle + registry…");
    const [battle, registry] = await Promise.all([
      loadBattle(battleId), loadRegistry(),
    ]);
    state.battle = battle;
    state.registry = registry;
    state.log = battle.log || [];

    // Pre-parse each unique rig referenced by participants.
    const rigsNeeded = new Set();
    for (const p of (battle.participants || [])) {
      const u = (registry.units || {})[p.template_code];
      const rigKey = (u && u.rig) || "mecha_demo";
      rigsNeeded.add(rigKey);
    }
    for (const rigKey of rigsNeeded) {
      const rigSpec = registry.rigs[rigKey];
      if (!rigSpec) throw new Error(`rig ${rigKey} not in registry`);
      setStatus(`loading rig ${rigKey}…`);
      await ensureRigParsed(rigKey, rigSpec);
    }

    // Place actors per participant.
    const aIdx = { A: 0, B: 0 };
    for (const p of (battle.participants || [])) {
      const u = (registry.units || {})[p.template_code];
      const rigKey = (u && u.rig) || "mecha_demo";
      const rigSpec = registry.rigs[rigKey];
      const idx = aIdx[p.side]++;
      const armature = buildActor(p.uid, p.side, idx, rigSpec);
      // Name label below the rig so we can tell who's who while the
      // placeholder mecha is the only available rig.
      const label = new PIXI.Text(
        (p.name || p.template_code || p.uid).slice(0, 14),
        { fontSize: 11, fill: 0xc0c8d4, fontFamily: "system-ui" },
      );
      label.x = armature.x - 50;
      label.y = armature.y + 24;
      app.stage.addChild(label);
      state.actors.set(p.uid, {
        armature,
        rigSpec,
        side: p.side,
        idleAnim: rigSpec.animations.idle || "idle",
        nameLabel: label,
        dead: false,
      });
    }

    setStatus(`✓ ${state.actors.size} actors ready · ${state.log.length} log events`);
    logLine(`Battle #${battle.id} · stage=${battle.stage_code || "?"} · outcome=${battle.outcome}`);
  }

  // ---- Event dispatcher ---------------------------------------------------

  function dispatch(ev) {
    const actor = ev.source ? state.actors.get(ev.source) : null;
    const target = ev.target ? state.actors.get(ev.target) : null;

    // Trim DAMAGE objects display
    const evType = ev.type;
    let line = `· ${evType}`;
    if (ev.source) line += ` from=${ev.source}`;
    if (ev.target) line += ` to=${ev.target}`;
    if (ev.amount) line += ` (${ev.amount})`;
    if (ev.via) line += ` via=${ev.via}`;
    logLine(line);

    // Source-side animation.
    if (actor && !actor.dead && EVENT_TO_ANIM[evType]) {
      try {
        const animKey = EVENT_TO_ANIM[evType](ev);
        const animName = (actor.rigSpec.animations || {})[animKey];
        if (animName) {
          actor.armature.animation.play(animName, 1);
          // Schedule return-to-idle after action ends.
          setTimeout(() => {
            if (!actor.dead) {
              actor.armature.animation.play(actor.idleAnim, 0);
            }
          }, Math.max(400, state.stepMs * 0.9));
        }
      } catch (e) { console.error("source anim:", e); }
    }

    // Target hit reaction for DAMAGE-style events.
    if (target && !target.dead && TARGET_HIT_EVENTS.has(evType)) {
      try {
        const hitName = (target.rigSpec.animations || {})["hit"];
        if (hitName) {
          target.armature.animation.play(hitName, 1);
          setTimeout(() => {
            if (!target.dead) {
              target.armature.animation.play(target.idleAnim, 0);
            }
          }, Math.max(300, state.stepMs * 0.5));
        }
      } catch (e) { console.error("target anim:", e); }

      // Damage popup at target.
      if (typeof ev.amount === "number" && ev.amount > 0) {
        const popup = new PIXI.Text(`-${ev.amount}`, {
          fontSize: 16, fill: ev.crit ? 0xff6b4a : 0xffd86b, fontWeight: "700",
          fontFamily: "system-ui",
          stroke: 0x000000, strokeThickness: 3,
        });
        popup.anchor.set(0.5);
        popup.x = target.armature.x;
        popup.y = target.armature.y - 60;
        app.stage.addChild(popup);
        const startY = popup.y;
        let life = 0;
        const popTicker = () => {
          life += app.ticker.elapsedMS;
          popup.y = startY - life * 0.04;
          popup.alpha = Math.max(0, 1 - life / 700);
          if (life > 700) {
            app.ticker.remove(popTicker);
            popup.destroy();
          }
        };
        app.ticker.add(popTicker);
      }
    }

    // DEATH handler — flag the actor + leave the death anim playing.
    if (evType === "DEATH" && actor) {
      actor.dead = true;
      try {
        const dn = (actor.rigSpec.animations || {})["death"];
        if (dn) actor.armature.animation.play(dn, 1);
      } catch (e) { console.error("death anim:", e); }
      // Fade label.
      if (actor.nameLabel) actor.nameLabel.alpha = 0.35;
    }
  }

  // ---- Replay ticker ------------------------------------------------------

  app.ticker.add(() => {
    if (!state.playing || !state.log.length) return;
    state.tickAcc += app.ticker.elapsedMS;
    const stepReal = state.stepMs / state.speedMul;
    while (state.tickAcc >= stepReal) {
      state.tickAcc -= stepReal;
      if (state.cursor >= state.log.length) {
        state.playing = false;
        setStatus("✓ replay complete");
        break;
      }
      const ev = state.log[state.cursor++];
      dispatch(ev);
    }
  });

  // ---- Controls -----------------------------------------------------------

  document.getElementById("btn-play").addEventListener("click", () => {
    if (state.cursor >= state.log.length) {
      // Restart on play after end.
      state.cursor = 0;
      // Reset actors.
      state.actors.forEach(a => {
        a.dead = false;
        a.armature.animation.play(a.idleAnim, 0);
        if (a.nameLabel) a.nameLabel.alpha = 1;
      });
    }
    state.playing = true;
    setStatus("▶ playing");
  });
  document.getElementById("btn-pause").addEventListener("click", () => {
    state.playing = false;
    setStatus("⏸ paused at event " + state.cursor + " / " + state.log.length);
  });
  document.getElementById("btn-step").addEventListener("click", () => {
    state.playing = false;
    if (state.cursor < state.log.length) {
      dispatch(state.log[state.cursor++]);
      setStatus(`⏭ step ${state.cursor} / ${state.log.length}`);
    }
  });
  document.getElementById("btn-restart").addEventListener("click", () => {
    state.cursor = 0;
    state.actors.forEach(a => {
      a.dead = false;
      a.armature.animation.play(a.idleAnim, 0);
      if (a.nameLabel) a.nameLabel.alpha = 1;
    });
    document.getElementById("event-log").innerHTML = "";
    state.playing = true;
    setStatus("⟲ restarted");
  });
  document.getElementById("speed").addEventListener("change", (e) => {
    state.speedMul = parseFloat(e.target.value) || 1;
  });

  // Esc closes the in-app overlay if we're embedded in the dashboard.
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && window.parent && window.parent !== window && window.parent.inApp) {
      window.parent.inApp.close();
    }
  });

  init().catch(err => {
    console.error(err);
    setStatus("init failed: " + (err.message || err), true);
  });
})();
</script>
</body>
</html>
