<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Replay</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0b0d10 0%, #14202b 100%);
      color: #ddd;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 28px;
      color: #fff;
      margin: 0 0 8px 0;
      font-weight: 800;
    }

    .outcome {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 16px;
      border-radius: 8px;
      display: inline-block;
    }

    .outcome.WIN {
      background: rgba(109, 211, 154, 0.2);
      color: #6dd39a;
      border: 1px solid rgba(109, 211, 154, 0.4);
    }

    .outcome.LOSS {
      background: rgba(255, 122, 89, 0.2);
      color: #ff7a59;
      border: 1px solid rgba(255, 122, 89, 0.4);
    }

    .outcome.DRAW {
      background: rgba(255, 216, 107, 0.2);
      color: #ffd86b;
      border: 1px solid rgba(255, 216, 107, 0.4);
    }

    /* BATTLE ARENA */
    .battle-arena {
      background: linear-gradient(135deg, #16191f 0%, #0f1217 100%);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 32px;
      min-height: 400px;
      display: flex;
      gap: 40px;
    }

    .team {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    .team.allies {
      align-items: flex-start;
    }

    .team.enemies {
      align-items: flex-end;
    }

    .team-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #6a7a8c;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .unit-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      width: 180px;
      text-align: center;
      transition: all 200ms ease;
      position: relative;  /* anchor for .faction-badge absolute overlay */
    }

    /* Rarity frame — composites a glow/border appropriate to the hero's rarity.
       Background-image points at /app/static/frames/<RARITY>.svg (256×256,
       transparent center). When rarity isn't known (empty string on legacy
       rows), no frame is applied. */
    .unit-card.rarity-COMMON { background-image: url('/app/static/frames/COMMON.svg'); background-size: cover; background-position: center; }
    .unit-card.rarity-UNCOMMON { background-image: url('/app/static/frames/UNCOMMON.svg'); background-size: cover; background-position: center; }
    .unit-card.rarity-RARE { background-image: url('/app/static/frames/RARE.svg'); background-size: cover; background-position: center; }
    .unit-card.rarity-EPIC { background-image: url('/app/static/frames/EPIC.svg'); background-size: cover; background-position: center; }
    .unit-card.rarity-LEGENDARY { background-image: url('/app/static/frames/LEGENDARY.svg'); background-size: cover; background-position: center; }

    /* Faction badge — tiny corner overlay on the portrait. */
    .faction-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      opacity: 0.9;
      pointer-events: none;
    }

    .unit-card.dead {
      opacity: 0.5;
      border-color: rgba(255,122,89,0.3);
    }

    .unit-card.selected {
      border-color: #ffd86b;
      box-shadow: 0 0 12px rgba(255,216,107,0.3);
    }

    .unit-portrait {
      width: 64px;
      height: 64px;
      background: rgba(89,160,255,0.15);
      border-radius: 6px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #59a0ff;
      text-transform: uppercase;
      overflow: hidden;
    }

    .unit-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .unit-name {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .unit-role {
      font-size: 8px;
      text-transform: uppercase;
      color: #6a7a8c;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .unit-hp {
      font-size: 10px;
      color: #ddd;
      margin-bottom: 6px;
    }

    .hp-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #6dd39a, #4ba377);
      transition: width 300ms ease;
    }

    .unit-status {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 20px;
    }

    .status-icon {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      overflow: hidden;
    }

    .status-icon img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .status-icon.ATK_UP {
      background: rgba(255,122,89,0.3);
      color: #ff7a59;
    }

    .status-icon.DEF_DOWN {
      background: rgba(255,100,100,0.3);
      color: #ff6464;
    }

    .status-icon.POISON {
      background: rgba(109,211,154,0.3);
      color: #6dd39a;
    }

    .status-icon.STUN {
      background: rgba(255,216,107,0.3);
      color: #ffd86b;
    }

    .status-icon.SHIELD {
      background: rgba(89,160,255,0.3);
      color: #59a0ff;
    }

    /* COMBAT LOG */
    .combat-log {
      background: linear-gradient(135deg, #16191f 0%, #0f1217 100%);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .log-title {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .log-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .log-btn {
      padding: 8px 16px;
      background: rgba(89,160,255,0.15);
      border: 1px solid rgba(89,160,255,0.3);
      color: #59a0ff;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 200ms ease;
    }

    .log-btn:hover {
      background: rgba(89,160,255,0.25);
      border-color: rgba(89,160,255,0.5);
    }

    .log-btn.active {
      background: #59a0ff;
      color: #000;
      border-color: #59a0ff;
    }

    .log-container {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-entry {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid rgba(89,160,255,0.3);
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.4;
    }

    .log-entry.highlight {
      background: rgba(89,160,255,0.1);
      border-left-color: #59a0ff;
      color: #ddd;
    }

    .log-entry strong {
      color: #fff;
      font-weight: 700;
    }

    .log-entry.DAMAGE { border-left-color: #ff7a59; }
    .log-entry.HEAL { border-left-color: #6dd39a; }
    .log-entry.DEATH { border-left-color: #ff6464; }
    .log-entry.SPECIAL { border-left-color: #c77dff; }
    .log-entry.STATUS_APPLIED { border-left-color: #ffd86b; }

    /* REWARDS */
    .rewards-section {
      background: linear-gradient(135deg, #16191f 0%, #0f1217 100%);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
    }

    .rewards-title {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .rewards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .reward-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .reward-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .reward-label {
      font-size: 9px;
      color: #6a7a8c;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }

    .reward-value {
      font-size: 14px;
      font-weight: 700;
      color: #ffd86b;
    }

    /* SCROLLBAR */
    .log-container::-webkit-scrollbar {
      width: 6px;
    }

    .log-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }

    .log-container::-webkit-scrollbar-thumb {
      background: rgba(89,160,255,0.3);
      border-radius: 3px;
    }

    .log-container::-webkit-scrollbar-thumb:hover {
      background: rgba(89,160,255,0.5);
    }

    @media (max-width: 1024px) {
      .battle-arena {
        flex-direction: column;
        gap: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Battle Replay</h1>
      <div class="outcome" id="outcome">Loading...</div>
    </header>

    <div class="battle-arena">
      <div class="team allies">
        <div class="team-label">Your Team</div>
        <div id="alliesContainer"></div>
      </div>
      <div class="team enemies">
        <div class="team-label">Enemy Team</div>
        <div id="enemiesContainer"></div>
      </div>
    </div>

    <div class="combat-log">
      <div class="log-title">Combat Log</div>
      <div class="log-controls">
        <button class="log-btn active" data-filter="all">All Events</button>
        <button class="log-btn" data-filter="damage">Damage</button>
        <button class="log-btn" data-filter="heal">Heal</button>
        <button class="log-btn" data-filter="status">Status</button>
        <button class="log-btn" data-filter="death">Deaths</button>
      </div>
      <div class="log-container" id="logContainer"></div>
    </div>

    <div class="rewards-section">
      <div class="rewards-title">Rewards</div>
      <div class="rewards-grid" id="rewardsGrid"></div>
    </div>
  </div>

  <script>
    // --- Live data -----------------------------------------------------------
    // Fetches GET /battles/{id} with the id from the URL ?id=N (or /arena/matches/{id}
    // when ?mode=arena). Preserves the downstream `mockBattle` identifier so all
    // the rendering helpers below work unchanged — only the assignment swapped.
    const TOKEN_KEY = "heroproto_jwt";
    const token = () => localStorage.getItem(TOKEN_KEY);
    const params = new URLSearchParams(location.search);
    const battleId = params.get("id");
    const mode = params.get("mode") || "battle";

    if (!token()) {
      document.body.innerHTML =
        '<div style="padding:40px;font:14px/1.4 system-ui;color:#ddd;">Not signed in. ' +
        '<a href="/app/" style="color:#59a0ff;">Go to dashboard</a> to log in first.</div>';
      throw new Error("not signed in");
    }
    if (!battleId) {
      document.body.innerHTML =
        '<div style="padding:40px;font:14px/1.4 system-ui;color:#ddd;">Missing <code>?id=N</code> in URL.</div>';
      throw new Error("missing id");
    }

    let mockBattle = null;  // name preserved so existing render code works as-is

    async function loadBattle() {
      const path = mode === "arena" ? `/arena/matches/${battleId}` : `/battles/${battleId}`;
      const r = await fetch(path, { headers: { Authorization: "Bearer " + token() } });
      if (!r.ok) {
        document.body.innerHTML =
          `<div style="padding:40px;font:14px/1.4 system-ui;color:#ff7a59;">load failed: ${r.status} — ${await r.text()}</div>`;
        throw new Error("HTTP " + r.status);
      }
      const data = await r.json();
      // Normalize rewards shape across battle vs arena and expose the fields the
      // template expects. Backend emits `xp_per_hero`; template reads `xp`.
      const rewards = data.rewards || {};
      const normalized = {
        coins: rewards.coins ?? 0,
        gems: rewards.gems ?? 0,
        shards: rewards.shards ?? 0,
        xp: rewards.xp ?? rewards.xp_per_hero ?? 0,
        first_clear: rewards.first_clear ?? data.first_clear ?? false,
      };
      if (mode === "arena") {
        normalized.rating_delta = data.rating_delta;
      }
      data.rewards = normalized;
      mockBattle = data;
    }

    let currentFilter = "all";
    let unitStates = {};

    // Initialize unit states
    function initUnitStates() {
      mockBattle.participants.forEach(p => {
        unitStates[p.uid] = {
          hp: p.max_hp,
          max_hp: p.max_hp,
          dead: false,
          statuses: []
        };
      });
    }

    // Render participants
    function renderParticipants() {
      const alliesContainer = document.getElementById("alliesContainer");
      const enemiesContainer = document.getElementById("enemiesContainer");
      alliesContainer.innerHTML = "";
      enemiesContainer.innerHTML = "";

      mockBattle.participants.forEach(p => {
        const card = document.createElement("div");
        card.className = "unit-card";
        if (unitStates[p.uid].dead) card.classList.add("dead");
        // Rarity frame via background-image CSS (transparent center so portrait shows through).
        if (p.rarity) card.classList.add(`rarity-${p.rarity}`);

        const state = unitStates[p.uid];
        const hpPercent = (state.hp / state.max_hp) * 100;

        const statusHtml = state.statuses
          .map(s => `<div class="status-icon ${s.kind}" title="${s.kind}">
            <img src="/app/static/status/${s.kind}.svg" alt="${s.kind}"
                 onerror="this.replaceWith(document.createTextNode('${s.kind.slice(0, 1)}'))" />
          </div>`)
          .join("");

        // Hero portrait: prefer real SVG at /app/static/heroes/<code>.svg, fall back
        // to two-letter initials if the file is missing (onerror handler swaps).
        const initials = p.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
        const portraitSrc = p.template_code
          ? `/app/static/heroes/${p.template_code}.svg`
          : "";
        const portraitHtml = portraitSrc
          ? `<img src="${portraitSrc}" alt="${p.name}"
                 onerror="this.parentElement.innerHTML='${initials}'" />`
          : initials;

        // Faction badge overlay (top-right of the card).
        const factionBadge = p.faction
          ? `<img class="faction-badge" src="/app/static/factions/${p.faction}.svg"
                  alt="${p.faction}" title="${p.faction}"
                  onerror="this.remove()" />`
          : "";

        card.innerHTML = `
          ${factionBadge}
          <div class="unit-portrait">${portraitHtml}</div>
          <div class="unit-name">${p.name}</div>
          <div class="unit-role">${p.role}</div>
          <div class="unit-hp"><span id="hp-${p.uid}">${state.hp}</span> / ${state.max_hp}</div>
          <div class="hp-bar"><div class="hp-fill" id="hpbar-${p.uid}" style="width: ${hpPercent}%"></div></div>
          <div class="unit-status">${statusHtml}</div>
        `;

        if (p.side === "A") alliesContainer.appendChild(card);
        else enemiesContainer.appendChild(card);
      });
    }

    // Process log entries
    function processLogEntry(entry) {
      if (entry.type === "DAMAGE") {
        const state = unitStates[entry.target];
        state.hp = Math.max(0, state.hp - entry.amount);
        updateHPBar(entry.target);
      } else if (entry.type === "HEAL") {
        const state = unitStates[entry.target];
        state.hp = Math.min(state.max_hp, state.hp + entry.amount);
        updateHPBar(entry.target);
      } else if (entry.type === "DEATH") {
        unitStates[entry.unit].dead = true;
      } else if (entry.type === "STATUS_APPLIED") {
        unitStates[entry.unit].statuses.push({ kind: entry.kind, turns: entry.turns });
      } else if (entry.type === "STATUS_EXPIRED") {
        unitStates[entry.unit].statuses = unitStates[entry.unit].statuses.filter(s => s.kind !== entry.kind);
      }
    }

    function updateHPBar(uid) {
      const state = unitStates[uid];
      const hpPercent = (state.hp / state.max_hp) * 100;
      const hpEl = document.getElementById(`hp-${uid}`);
      const barEl = document.getElementById(`hpbar-${uid}`);
      if (hpEl) hpEl.textContent = state.hp;
      if (barEl) barEl.style.width = hpPercent + "%";
    }

    // Render combat log
    function renderCombatLog() {
      const logContainer = document.getElementById("logContainer");
      logContainer.innerHTML = "";

      mockBattle.log.forEach((entry, idx) => {
        // Process to update states
        processLogEntry(entry);

        // Filter
        if (currentFilter !== "all") {
          if (currentFilter === "damage" && !["DAMAGE", "CRITICAL"].includes(entry.type)) return;
          if (currentFilter === "heal" && entry.type !== "HEAL") return;
          if (currentFilter === "status" && !["STATUS_APPLIED", "STATUS_EXPIRED"].includes(entry.type)) return;
          if (currentFilter === "death" && entry.type !== "DEATH") return;
        }

        // Format log entry
        let text = "";
        let className = `log-entry ${entry.type}`;

        if (entry.type === "TURN") {
          text = `<strong>${getUnitName(entry.unit)}</strong> takes a turn`;
        } else if (entry.type === "DAMAGE") {
          const crit = entry.crit ? " 💥" : "";
          text = `<strong>${getUnitName(entry.source)}</strong> deals <strong>${entry.amount}</strong> damage to <strong>${getUnitName(entry.target)}</strong>${crit}`;
        } else if (entry.type === "HEAL") {
          text = `<strong>${getUnitName(entry.source)}</strong> heals <strong>${getUnitName(entry.target)}</strong> for <strong>${entry.amount}</strong>`;
        } else if (entry.type === "DEATH") {
          text = `<strong>${getUnitName(entry.unit)}</strong> has been defeated`;
        } else if (entry.type === "SPECIAL") {
          text = `<strong>${getUnitName(entry.unit)}</strong> uses <strong>${entry.name}</strong>`;
        } else if (entry.type === "STATUS_APPLIED") {
          text = `<strong>${getUnitName(entry.unit)}</strong> gains <strong>${entry.kind}</strong>`;
        } else if (entry.type === "STATUS_EXPIRED") {
          text = `<strong>${getUnitName(entry.unit)}</strong>'s <strong>${entry.kind}</strong> expires`;
        } else if (entry.type === "STUNNED") {
          text = `<strong>${getUnitName(entry.unit)}</strong> is stunned and cannot act`;
        } else if (entry.type === "END") {
          text = `Battle ended: <strong>${entry.outcome}</strong>`;
        }

        if (text) {
          const el = document.createElement("div");
          el.className = className;
          el.innerHTML = text;
          logContainer.appendChild(el);
        }
      });
    }

    function getUnitName(uid) {
      const p = mockBattle.participants.find(x => x.uid === uid);
      return p ? p.name : uid;
    }

    // Render rewards
    function renderRewards() {
      const grid = document.getElementById("rewardsGrid");
      grid.innerHTML = `
        <div class="reward-item">
          <div class="reward-icon">🪙</div>
          <div class="reward-label">Coins</div>
          <div class="reward-value">${mockBattle.rewards.coins}</div>
        </div>
        <div class="reward-item">
          <div class="reward-icon">⭐</div>
          <div class="reward-label">XP</div>
          <div class="reward-value">${mockBattle.rewards.xp}</div>
        </div>
        <div class="reward-item">
          <div class="reward-icon">✨</div>
          <div class="reward-label">Shards</div>
          <div class="reward-value">${mockBattle.rewards.shards}</div>
        </div>
      `;
    }

    // Filter buttons
    document.querySelectorAll(".log-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".log-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderCombatLog();
      });
    });

    // Initial render — must wait for the battle payload to arrive.
    (async () => {
      await loadBattle();
      document.getElementById("outcome").className = `outcome ${mockBattle.outcome}`;
      document.getElementById("outcome").textContent = mockBattle.outcome;
      initUnitStates();
      renderParticipants();
      renderCombatLog();
      renderRewards();
    })();
  </script>

</body>
</html>
