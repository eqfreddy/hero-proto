name: Android build

# Trigger manually or on version tags.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK / AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      WORKING_DIR: mobile

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java (Gradle needs 17) ─────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Build SPA ─────────────────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build SPA
        working-directory: frontend
        run: npm run build

      # ── Capacitor Android ─────────────────────────────────────────────────
      - name: Install Capacitor deps
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Sync web assets → Android
        working-directory: ${{ env.WORKING_DIR }}
        run: npx cap sync android

      # ── Firebase (FCM) ────────────────────────────────────────────────────
      # GOOGLE_SERVICES_JSON secret: base64-encoded contents of google-services.json
      # from Firebase Console → Project settings → Your apps → google-services.json
      - name: Place google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        working-directory: ${{ env.WORKING_DIR }}/android/app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json

      # ── Keystore (release signing) ─────────────────────────────────────────
      # ANDROID_KEYSTORE_BASE64  base64 of your .jks or .keystore file
      # ANDROID_KEYSTORE_PASSWORD  storePassword
      # ANDROID_KEY_ALIAS          key alias (default: heroproto)
      # ANDROID_KEY_PASSWORD       keyPassword
      - name: Install release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          KEYSTORE_PATH=$RUNNER_TEMP/release.keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS || 'heroproto' }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: ${{ env.WORKING_DIR }}/android
        run: chmod +x gradlew

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: ./gradlew assembleDebug

      - name: Build release AAB
        if: ${{ github.event.inputs.build_type != 'debug' }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: ./gradlew bundleRelease

      - name: Build release APK (sideload / testing)
        if: ${{ github.event.inputs.build_type != 'debug' }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: ./gradlew assembleRelease

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: HeroProto-debug-${{ github.ref_name }}.apk
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload release AAB
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: HeroProto-release-${{ github.ref_name }}.aab
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: HeroProto-release-${{ github.ref_name }}.apk
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Play Store (AAB only, on tag push) ────────────────────────────────
      # Uncomment + add GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret to auto-upload
      # - name: Upload to Play Store (internal track)
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.heroproto.app
      #     releaseFiles: ${{ env.WORKING_DIR }}/android/app/build/outputs/bundle/release/*.aab
      #     track: internal
      #     status: draft
